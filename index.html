<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YUIMEI">
<title>YUIMEI LIFE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --black:#0a0a0a;--surface:#111111;--surface2:#1a1a1a;--surface3:#222222;
  --border:#2a2a2a;--border2:#333333;
  --accent:#e8ff47;--accent2:#ff6b35;--accent3:#47b4ff;--accent4:#b47fff;
  --green:#3ddc84;--red:#ff4757;
  --text:#f0f0f0;--text2:#999999;--muted:#666666;--muted2:#444444;
}
html,body{background:var(--black);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden}
.app{max-width:430px;margin:0 auto;padding-bottom:80px}
.ring-section{padding:28px 20px 16px;text-align:center}
.widgets-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:12px;grid-auto-flow:dense}
.widget{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:14px;position:relative}
.widget.main-widget{grid-column:1}
.widget.sub-widget{grid-column:1;display:grid;grid-template-columns:120px 1fr;gap:12px;align-items:center}
.widget.sub-widget .ring-wrap{width:120px;height:120px}
.widget.sub-widget .ring-svg{width:120px;height:120px}
.widget.sub-widget .ring-center{width:80px}
.widget.sub-widget .ring-current{font-size:22px}
.widget.sub-widget .ring-sep{font-size:8px}
.widget.sub-widget .ring-goal-txt{font-size:10px}
.widget.sub-widget .ring-pct{font-size:9px}
.widget-close{position:absolute;top:8px;right:8px;width:24px;height:24px;border:none;background:none;color:var(--muted2);font-size:16px;cursor:pointer;padding:0;line-height:1}
.top-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.25em;color:var(--muted)}
.app-date{font-size:11px;color:var(--muted);margin-top:3px}
.top-score-box{text-align:right}
.top-score-n{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--accent);line-height:1}
.top-score-l{font-size:9px;letter-spacing:.1em;color:var(--muted)}
.ring-wrap{position:relative;width:190px;height:190px;margin:0 auto 6px}
.ring-svg{width:190px;height:190px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--surface3);stroke-width:13}
.ring-fill{fill:none;stroke:var(--accent);stroke-width:13;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 0 8px rgba(232,255,71,.35))}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:130px}
.ring-current{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;color:var(--accent)}
.ring-sep{font-size:10px;color:var(--muted);margin:2px 0}
.ring-goal-txt{font-size:12px;color:var(--muted);font-family:'Bebas Neue',sans-serif}
.ring-pct{font-size:11px;color:var(--accent);margin-top:2px}
.ring-label{font-size:10px;letter-spacing:.14em;color:var(--muted);margin-top:4px}
.goal-row{display:flex;justify-content:center;gap:8px;margin-top:8px}
.goal-btn{background:none;border:0.5px solid var(--border2);color:var(--muted);font-size:11px;padding:4px 12px;border-radius:20px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.tab-bar{display:flex;overflow-x:auto;border-bottom:0.5px solid var(--border)}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;flex:1;min-width:55px;padding:11px 4px 9px;font-size:10px;letter-spacing:.06em;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;transition:.15s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.section{display:none;padding:18px 14px 0;animation:fi .2s ease}
.section.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.sec-label{font-size:10px;letter-spacing:.18em;color:var(--muted);margin-bottom:10px;text-transform:uppercase}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:15px;padding:14px;margin-bottom:10px}
.subj-header{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border);cursor:pointer}
.subj-name{font-size:14px;font-weight:500}
.subj-arrow{font-size:10px;color:var(--muted);transition:.2s;margin-left:8px}
.subj-arrow.open{transform:rotate(90deg)}
.subj-books{padding:6px 0 2px;display:none}
.subj-books.open{display:block}
.book-row{display:flex;align-items:center;gap:5px;padding:8px 0;border-bottom:0.5px solid var(--border2)}
.book-row:last-child{border-bottom:none}
.book-name{font-size:13px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.book-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.step-btn{width:26px;height:26px;border-radius:7px;border:0.5px solid var(--border2);background:var(--surface3);color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.book-mins-input{width:50px;height:26px;background:var(--surface3);border:0.5px solid var(--border2);border-radius:7px;color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:14px;text-align:center;padding:0 3px}
.book-mins-input:focus{outline:none;border-color:var(--accent)}
.timer-start-btn{width:26px;height:26px;border-radius:7px;border:0.5px solid var(--accent3);background:none;color:var(--accent3);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.timer-start-btn.running{background:var(--accent3);color:var(--black)}
.del-btn{width:22px;height:22px;border:none;background:none;color:var(--muted2);font-size:16px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
.add-btn{width:100%;margin-top:8px;padding:9px;border-radius:10px;border:0.5px dashed var(--border2);background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.add-btn:active{background:var(--surface2)}
.check-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:0.5px solid var(--border)}
.check-item:last-child{border-bottom:none}
.check-box{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--border2);background:none;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.check-box.done{background:var(--accent);border-color:var(--accent)}
.check-box.done::after{content:'✓';font-size:12px;color:var(--black);font-weight:700}
.check-label{font-size:13px;cursor:pointer;flex:1}
.check-item.done .check-label{color:var(--muted);text-decoration:line-through}
.check-del{width:24px;height:24px;border:none;background:none;color:var(--red);font-size:18px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;transition:.15s}
.check-del:active{opacity:.6}
.health-section-label{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:14px 0 8px}
.health-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px}
.health-card{background:var(--surface);border:0.5px solid var(--border);border-radius:13px;padding:12px 8px;text-align:center}
.health-val{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;margin-bottom:2px}
.health-label{font-size:10px;color:var(--text2);margin-bottom:8px}
.h-ctrl{display:flex;justify-content:center;align-items:center;gap:5px}
.ex-card{background:var(--surface);border:0.5px solid var(--border);border-radius:13px;margin-bottom:8px;overflow:hidden}
.ex-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer}
.ex-title{font-size:13px;font-weight:500}
.ex-body{padding:0 14px 10px;display:none}
.ex-body.open{display:block}
.ex-set-row{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:0.5px solid var(--border2);font-size:13px}
.ex-set-row:last-child{border-bottom:none}
.ex-set-name{flex:1;color:var(--text2)}
.ex-num-input{width:52px;height:26px;background:var(--surface3);border:0.5px solid var(--border2);border-radius:7px;font-family:'Bebas Neue',sans-serif;font-size:14px;text-align:center;padding:0 4px}
.ex-num-input:focus{outline:none}
.ex-unit{font-size:11px;color:var(--muted);min-width:24px}
.strength-note{background:var(--surface2);border-radius:10px;padding:10px;margin-bottom:8px;border:0.5px solid var(--border2)}
.strength-input-row{display:flex;gap:6px;align-items:center}
.strength-num{width:50px;height:24px;background:var(--surface3);border:0.5px solid var(--border2);border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:12px;text-align:center;padding:0 4px}
.strength-num:focus{outline:none;border-color:var(--accent2)}
.strength-note-memo{flex:1;height:24px;background:var(--surface3);border:0.5px solid var(--border2);border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:0 6px;color:var(--text2)}
.strength-note-memo:focus{outline:none;border-color:var(--accent2)}
.record-filter-btn{padding:7px 12px;border-radius:16px;border:0.5px solid var(--border2);background:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;flex-shrink:0;transition:.15s}
.record-filter-btn.active{background:var(--accent);color:var(--black);border-color:var(--accent)}
.diary-date-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.diary-date-label{font-size:12px;color:var(--muted);white-space:nowrap}
.diary-date-input{flex:1;background:var(--surface2);border:0.5px solid var(--border2);border-radius:9px;padding:7px 11px;color:var(--text);font-size:13px;font-family:'Noto Sans JP',sans-serif}
.diary-date-input:focus{outline:none;border-color:var(--accent)}
.diary-area{width:100%;background:var(--surface);border:0.5px solid var(--border);border-radius:13px;padding:13px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;line-height:1.8;resize:none;min-height:200px}
.diary-area:focus{outline:none;border-color:var(--accent)}
.diary-save{width:100%;margin-top:10px;padding:12px;border-radius:12px;border:none;background:var(--accent);color:var(--black);font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.diary-saved{font-size:12px;color:var(--green);text-align:center;margin-top:8px;opacity:0;transition:.3s}
.diary-saved.show{opacity:1}
.feed-card{background:var(--surface);border:0.5px solid var(--border);border-radius:15px;padding:15px;margin-bottom:10px;position:relative;overflow:hidden}
.feed-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent4)}
.feed-tag{font-size:10px;letter-spacing:.15em;color:var(--accent4);margin-bottom:6px;text-transform:uppercase}
.feed-title{font-size:15px;font-weight:500;line-height:1.4;margin-bottom:7px}
.feed-body{font-size:13px;color:var(--text2);line-height:1.7}
.feed-refresh{width:100%;padding:11px;border-radius:12px;border:0.5px solid var(--border2);background:none;color:var(--muted);font-size:13px;cursor:pointer;margin-top:4px;font-family:'Noto Sans JP',sans-serif}
.record-day{background:var(--surface);border:0.5px solid var(--border);border-radius:13px;margin-bottom:8px;overflow:hidden}
.record-header{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer}
.record-date-txt{font-size:13px;font-weight:500}
.record-score{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent)}
.record-body{padding:2px 14px 13px;display:none;border-top:0.5px solid var(--border)}
.record-body.open{display:block}
.record-item{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:0.5px solid var(--border2)}
.record-item:last-child{border-bottom:none}
.record-val{color:var(--accent3)}
.empty-record{text-align:center;color:var(--muted);font-size:13px;padding:40px 0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.25s}
.modal-bg.open{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:430px;transform:translateY(40px);transition:.25s}
.modal-bg.open .modal{transform:translateY(0)}
.modal-title{font-size:15px;font-weight:500;margin-bottom:14px}
.modal-input{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:10px;padding:11px 13px;color:var(--text);font-size:14px;font-family:'Noto Sans JP',sans-serif;margin-bottom:8px}
.modal-input:focus{outline:none;border-color:var(--accent)}
.modal-row{display:flex;gap:8px;margin-bottom:8px}
.modal-row .modal-input{margin-bottom:0;flex:1}
.modal-ok{width:100%;padding:12px;border-radius:11px;border:none;background:var(--accent);color:var(--black);font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-bottom:8px}
.modal-cancel{width:100%;padding:10px;border-radius:11px;border:0.5px solid var(--border2);background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.timer-overlay{position:fixed;inset:0;background:var(--black);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s}
.timer-overlay.active{opacity:1;pointer-events:auto}
.timer-subject-name{font-size:12px;letter-spacing:.2em;color:var(--muted);margin-bottom:4px;text-transform:uppercase}
.timer-book-name{font-size:16px;color:var(--text2);margin-bottom:36px;text-align:center;padding:0 20px}
.timer-ring-wrap{position:relative;width:240px;height:240px;margin-bottom:30px}
.timer-ring-svg{width:240px;height:240px;transform:rotate(-90deg)}
.timer-ring-bg{fill:none;stroke:var(--surface3);stroke-width:10}
.timer-ring-fill{fill:none;stroke:var(--accent3);stroke-width:10;stroke-linecap:round;filter:drop-shadow(0 0 12px rgba(71,180,255,.5))}
.timer-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.timer-display{font-family:'Bebas Neue',sans-serif;font-size:58px;color:var(--accent3);line-height:1;letter-spacing:.04em}
.timer-elapsed-label{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.12em}
.timer-controls{display:flex;gap:14px;margin-bottom:24px}
.timer-ctrl-btn{width:62px;height:62px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.timer-ctrl-btn.primary{background:var(--accent3);border-color:var(--accent3);color:var(--black);font-size:22px}
.timer-ctrl-btn:active{transform:scale(.93)}
.timer-pause-note{font-size:11px;color:var(--muted);text-align:center;margin-bottom:20px;padding:0 20px}
.timer-minimize{padding:10px 24px;border-radius:20px;border:0.5px solid var(--border2);background:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.timer-mini{display:none;background:var(--surface);border:0.5px solid var(--accent3);border-radius:12px;margin:0 14px 10px;padding:10px 14px;align-items:center;gap:10px;cursor:pointer}
.timer-mini.visible{display:flex}
.timer-mini-dot{width:8px;height:8px;border-radius:50%;background:var(--accent3);flex-shrink:0;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.timer-mini-text{font-size:12px;flex:1;color:var(--text2)}
.timer-mini-time{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--accent3)}
.timer-mini-resume{font-size:11px;color:var(--accent3);padding:4px 10px;border:0.5px solid var(--accent3);border-radius:8px;background:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;flex-shrink:0}
</style>
</head>
<body>
<div class="app">
<div class="ring-section">
  <div class="top-row">
    <div>
      <div class="app-title">YUIMEI LIFE</div>
      <div class="app-date" id="hdate"></div>
    </div>
    <div class="top-score-box">
      <div class="top-score-n" id="topScore">—</div>
      <div class="top-score-l">LIFE SCORE</div>
    </div>
  </div>
  
  <div class="widgets-grid" id="widgetsGrid">
    <!-- Main widget: Study Time -->
    <div class="widget main-widget">
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 190 190">
          <circle class="ring-bg" cx="95" cy="95" r="78"/>
          <circle class="ring-fill" id="ringFill" cx="95" cy="95" r="78" stroke-dasharray="490" stroke-dashoffset="490"/>
        </svg>
        <div class="ring-center">
          <div class="ring-current" id="ringCurrent">0h 00m</div>
          <div class="ring-sep">/ GOAL</div>
          <div class="ring-goal-txt" id="ringGoal">6h 00m</div>
          <div class="ring-pct" id="ringPct">0%</div>
        </div>
      </div>
      <div class="ring-label">TODAY'S STUDY TIME</div>
      <div class="goal-row">
        <button class="goal-btn" onclick="openModal('goal')">⚙ Change Goal</button>
      </div>
    </div>
  </div>
  
  <div style="text-align:center;margin-top:12px">
    <button class="goal-btn" onclick="addWidget()" style="margin-right:6px">+ Add Widget</button>
  </div>
</div>

<div class="timer-mini" id="timerMini">
  <div class="timer-mini-dot"></div>
  <div class="timer-mini-text" id="timerMiniText">Paused</div>
  <div class="timer-mini-time" id="timerMiniTime">00:00</div>
  <button class="timer-mini-resume" onclick="showTimer()">Resume</button>
</div>

<div class="tab-bar">
  <button class="tab-btn" onclick="switchTab('diary',this)">DIARY</button>
  <button class="tab-btn" onclick="switchTab('check',this)">CHECK</button>
  <button class="tab-btn" onclick="switchTab('health',this)">HEALTH</button>
  <button class="tab-btn active" onclick="switchTab('study',this)">STUDY</button>
  <button class="tab-btn" onclick="switchTab('motivation',this)">MOTIVATION</button>
  <button class="tab-btn" onclick="switchTab('record',this)">RECORD</button>
</div>

<div class="section active" id="tab-study">
  <div class="sec-label">Study Log</div>
  <div id="subjectList"></div>
  <button class="add-btn" onclick="openModal('subject')">+ Add Subject</button>
</div>

<div class="section" id="tab-check">
  <div class="sec-label">Daily Checklist</div>
  <div class="card" id="checklist"></div>
  <button class="add-btn" style="margin-top:0" onclick="openModal('check')">+ Add Item</button>
</div>

<div class="section" id="tab-health">
  <div class="sec-label">Health Log</div>
  <div class="health-section-label" style="margin-top:0">General</div>
  <div class="health-grid" id="healthGrid"></div>
  <div class="health-section-label">有酸素運動 — Cardio</div>
  <div id="cardioList"></div>
  <button class="add-btn" onclick="openModal('cardio')">+ Add Cardio Exercise</button>
  <div class="health-section-label">筋トレ — Strength Training</div>
  <div id="strengthList"></div>
  <button class="add-btn" onclick="openModal('strength')">+ Add Strength Exercise</button>
  <div style="margin-top:14px">
    <div class="sec-label">Body Memo</div>
    <textarea class="diary-area" id="healthMemo" placeholder="体調メモ..." style="min-height:80px"></textarea>
  </div>
</div>

<div class="section" id="tab-diary">
  <div class="sec-label">Daily Journal</div>
  <div class="diary-date-row">
    <span class="diary-date-label">📅 Date</span>
    <input class="diary-date-input" type="date" id="diaryDate">
  </div>
  <textarea class="diary-area" id="diaryText" placeholder="今日の出来事、感じたこと、明日の目標..."></textarea>
  <button class="diary-save" onclick="saveDiary()">SAVE ENTRY</button>
  <div class="diary-saved" id="diarySaved">Saved ✓</div>
</div>


<div class="section" id="tab-record">
  <div class="sec-label">Life Score Trend</div>
  <div style="display:flex;gap:6px;margin-bottom:12px">
    <button class="record-filter-btn active" onclick="setRecordPeriod(7)">7日</button>
    <button class="record-filter-btn" onclick="setRecordPeriod(30)">30日</button>
    <button class="record-filter-btn" onclick="setRecordPeriod(90)">90日</button>
    <button class="record-filter-btn" onclick="setRecordPeriod(0)">全期間</button>
  </div>
  <div id="recordGraph" style="background:var(--surface);border:0.5px solid var(--border);border-radius:15px;padding:20px;height:300px;position:relative;margin-bottom:20px">
    <svg id="scoreChart" style="width:100%;height:100%" viewBox="0 0 400 300"></svg>
  </div>
  <div id="recordStats" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
    <div class="card" style="text-align:center;margin-bottom:0">
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px">平均</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent)" id="recordAvg">—</div>
    </div>
    <div class="card" style="text-align:center;margin-bottom:0">
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px">最高</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--accent)" id="recordMax">—</div>
    </div>
  </div>
  <div id="recordList"></div>
</div>

<div class="section" id="tab-motivation">
  <div class="sec-label">Quotes & Videos</div>
  <div style="display:flex;gap:6px;margin-bottom:12px">
    <button class="record-filter-btn active" onclick="switchMotivationView('videos')">Videos</button>
    <button class="record-filter-btn" onclick="switchMotivationView('quotes')">Quotes</button>
  </div>
  
  <div id="videosView">
    <div id="videoFullscreen" style="display:none;position:fixed;inset:0;background:var(--black);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px">
      <button style="position:absolute;top:20px;left:20px;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer;z-index:101" onclick="closeVideoFullscreen()">←</button>
      <video id="videoPlayer" style="width:100%;height:100%;max-width:430px;object-fit:contain" controls autoplay></video>
      <div style="position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:var(--muted);font-size:12px;text-align:center" id="videoCounter"></div>
    </div>
    
    <div id="videoListView">
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input type="file" id="videoUpload" accept="video/mp4" multiple style="flex:1;font-size:12px">
        <button class="add-btn" style="margin-top:0;flex:0.3" onclick="uploadVideo()">Upload</button>
      </div>
      <div id="videoThumbnails" style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px"></div>
    </div>
  </div>
  
  <div id="quotesView" style="display:none">
    <div id="quotesList"></div>
    <button class="add-btn" onclick="openModal('quote')">+ Add Quote</button>
  </div>
</div>

</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add</div>
    <div id="modalBody"></div>
    <button class="modal-ok" id="modalOk" onclick="modalConfirm()">Add</button>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div class="timer-overlay" id="timerOverlay">
  <div class="timer-subject-name" id="timerSubjectName"></div>
  <div class="timer-book-name" id="timerBookName"></div>
  <div class="timer-ring-wrap">
    <svg class="timer-ring-svg" viewBox="0 0 240 240">
      <circle class="timer-ring-bg" cx="120" cy="120" r="105"/>
      <circle class="timer-ring-fill" id="timerRingFill" cx="120" cy="120" r="105"
        stroke-dasharray="660" stroke-dashoffset="0"
        style="transition:stroke-dashoffset 1s linear"/>
    </svg>
    <div class="timer-center">
      <div class="timer-display" id="timerDisplay">00:00</div>
      <div class="timer-elapsed-label">ELAPSED</div>
    </div>
  </div>
  <div class="timer-controls">
    <button class="timer-ctrl-btn" onclick="confirmResetTimer()" title="Reset">↺</button>
    <button class="timer-ctrl-btn primary" id="timerPlayPause" onclick="toggleTimer()">⏸</button>
    <button class="timer-ctrl-btn" onclick="confirmStopTimer()" title="Stop & Save">■</button>
  </div>
  <div class="timer-pause-note" id="timerPauseNote"></div>
  <button class="timer-minimize" onclick="minimizeTimer()">Minimize — 最小化</button>
</div>

<script>
const TODAY_KEY=new Date().toISOString().slice(0,10);
let state=JSON.parse(localStorage.getItem('ym4_'+TODAY_KEY)||'null')||{study:{},checks:{},health:{sleep:7,exercise:0,meal:3},cardio:{},strength:{},diary:'',diaryDate:TODAY_KEY,healthMemo:''};
let allData=JSON.parse(localStorage.getItem('ym4_all')||'{}');
let subjects=JSON.parse(localStorage.getItem('ym4_subjects')||'null')||[{id:'s1',name:'英語',books:[{id:'b1',name:'ターゲット1900'},{id:'b2',name:'ネクステージ'}]},{id:'s2',name:'数学',books:[{id:'b1',name:'青チャート'}]},{id:'s3',name:'国語',books:[{id:'b1',name:'現代文読解'}]}];
let checkItems=JSON.parse(localStorage.getItem('ym4_checks')||'null')||[{id:'c1',label:'Breakfast — 朝食'},{id:'c2',label:'Teeth / Skincare — 身だしなみ'},{id:'c3',label:'Study — 勉強した'},{id:'c4',label:'Exercise — 運動した'},{id:'c5',label:'No Doomscrolling — SNS制限'},{id:'c6',label:'Sleep 7h+ — 7時間以上睡眠'},{id:'c7',label:'Evening Review — 夜の振り返り'}];
let cardioList=JSON.parse(localStorage.getItem('ym4_cardio')||'null')||[{id:'ca1',name:'ランニング',unit:'km'},{id:'ca2',name:'ウォーキング',unit:'分'}];
let strengthList=JSON.parse(localStorage.getItem('ym4_strength')||'null')||[{id:'st1',name:'腕立て伏せ',unit:'回'},{id:'st2',name:'スクワット',unit:'回'},{id:'st3',name:'腹筋',unit:'回'}];
let goalMins=+localStorage.getItem('ym4_goal')||360;

// ===== WIDGETS =====
let widgets=JSON.parse(localStorage.getItem('ym4_widgets')||'null')||['study'];

function saveWidgets(){localStorage.setItem('ym4_widgets',JSON.stringify(widgets));}

function addWidget(){
  const modal=document.createElement('div');
  modal.className='modal-bg open';
  modal.id='widgetModal';
  modal.innerHTML=`
    <div class="modal">
      <div class="modal-title">Add Widget</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="modal-ok" onclick="selectWidget('exercise')">運動</button>
        <button class="modal-ok" onclick="selectWidget('checks')">チェック</button>
        <button class="modal-ok" onclick="selectWidget('remaining-days')">残り日数</button>
        <button class="modal-cancel" onclick="document.getElementById('widgetModal').remove()">キャンセル</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function selectWidget(w){
  if(!widgets.includes(w)){
    if(w==='remaining-days'){
      const title=prompt('タイトルを入力（例：受験日まで）:','受験日まで');
      if(!title)return;
      const date=prompt('日付を入力（YYYY-MM-DD）:',new Date(new Date().getFullYear(),11,31).toISOString().slice(0,10));
      if(!date)return;
      widgets.push({type:w,title,date});
    }else{
      widgets.push(w);
    }
    saveWidgets();
    renderWidgets();
  }
  document.getElementById('widgetModal')?.remove();
}

function removeWidget(w){
  if(w==='study'){alert('勉強ウィジェットは削除できません');return;}
  widgets=widgets.filter(x=>(typeof x==='string'?x:x.type)!==w);
  saveWidgets();
  renderWidgets();
}

function renderWidgets(){
  const grid=document.getElementById('widgetsGrid');
  grid.innerHTML='';
  
  // Main widget
  const mainDiv=document.createElement('div');
  mainDiv.className='widget main-widget';
  mainDiv.innerHTML=`
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 190 190">
        <circle class="ring-bg" cx="95" cy="95" r="78"/>
        <circle class="ring-fill" id="ringFill" cx="95" cy="95" r="78" stroke-dasharray="490" stroke-dashoffset="490"/>
      </svg>
      <div class="ring-center">
        <div class="ring-current" id="ringCurrent">0h 00m</div>
        <div class="ring-sep">/ GOAL</div>
        <div class="ring-goal-txt" id="ringGoal">6h 00m</div>
        <div class="ring-pct" id="ringPct">0%</div>
      </div>
    </div>
    <div class="ring-label">TODAY'S STUDY TIME</div>
    <div class="goal-row">
      <button class="goal-btn" onclick="openModal('goal')">⚙ Change Goal</button>
    </div>
  `;
  grid.appendChild(mainDiv);
  
  // Sub widgets
  widgets.forEach(w=>{
    const wType=typeof w==='string'?w:w.type;
    if(wType==='study')return;
    const div=document.createElement('div');
    div.className='widget sub-widget';
    
    if(wType==='exercise'){
      const exTime=state.health?.exercise||0;
      div.innerHTML=`
        <button class="widget-close" onclick="removeWidget('exercise')">×</button>
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="50"/>
            <circle class="ring-fill" cx="60" cy="60" r="50" stroke="var(--green)" stroke-width="8" stroke-dasharray="${Math.PI*100}" stroke-dashoffset="${Math.PI*100*(1-Math.min(1,exTime/60))}" style="fill:none;stroke-linecap:round"/>
          </svg>
          <div class="ring-center">
            <div class="ring-current">${exTime}min</div>
          </div>
        </div>
        <div>
          <div class="ring-label">EXERCISE</div>
          <div style="font-size:11px;color:var(--text2)">目標: 60分</div>
        </div>
      `;
    }else if(wType==='checks'){
      const done=Object.values(state.checks||{}).filter(Boolean).length;
      const total=checkItems.length;
      div.innerHTML=`
        <button class="widget-close" onclick="removeWidget('checks')">×</button>
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="50"/>
            <circle class="ring-fill" cx="60" cy="60" r="50" stroke="var(--accent3)" stroke-width="8" stroke-dasharray="${Math.PI*100}" stroke-dashoffset="${Math.PI*100*(1-done/total)}" style="fill:none;stroke-linecap:round"/>
          </svg>
          <div class="ring-center">
            <div class="ring-current" style="font-size:20px">${done}/${total}</div>
          </div>
        </div>
        <div>
          <div class="ring-label">CHECKS</div>
          <div style="font-size:11px;color:var(--text2)">チェック項目</div>
        </div>
      `;
    }else if(wType==='remaining-days'){
      const wObj=typeof w==='object'?w:{type:'remaining-days',title:'残り日数',date:new Date(new Date().getFullYear(),11,31).toISOString().slice(0,10)};
      const daysLeft=Math.ceil((new Date(wObj.date)-new Date())/(1000*60*60*24));
      div.innerHTML=`
        <button class="widget-close" onclick="removeWidget('remaining-days')">×</button>
        <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:120px">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--accent4)">${Math.max(0,daysLeft)}</div>
          <div class="ring-label" style="margin-top:0">${wObj.title}</div>
          <div style="font-size:11px;color:var(--text2)">${wObj.date}</div>
        </div>
      `;
    }
    grid.appendChild(div);
  });
}

function saveState(){localStorage.setItem('ym4_'+TODAY_KEY,JSON.stringify(state));allData[TODAY_KEY]=JSON.parse(JSON.stringify(state));localStorage.setItem('ym4_all',JSON.stringify(allData));}
function saveSubjects(){localStorage.setItem('ym4_subjects',JSON.stringify(subjects));}
function saveChecks(){localStorage.setItem('ym4_checks',JSON.stringify(checkItems));}
function saveCardio(){localStorage.setItem('ym4_cardio',JSON.stringify(cardioList));}
function saveStrength(){localStorage.setItem('ym4_strength',JSON.stringify(strengthList));}

const _d=new Date();
document.getElementById('hdate').textContent=_d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
document.getElementById('diaryDate').value=state.diaryDate||TODAY_KEY;

function minsToStr(m){const h=Math.floor(m/60),mn=m%60;return h+'h '+String(mn).padStart(2,'0')+'m'}
function getTotalStudy(){return subjects.reduce((a,s)=>a+s.books.reduce((a2,b)=>a2+(state.study[s.id]?.[b.id]||0),0),0);}

function updateRing(){
  const tot=getTotalStudy();
  const pct=Math.min(1,tot/goalMins);
  const circ=2*Math.PI*78;
  const f=document.getElementById('ringFill');
  f.style.strokeDasharray=circ;
  f.style.strokeDashoffset=circ*(1-pct);
  document.getElementById('ringCurrent').textContent=minsToStr(tot);
  document.getElementById('ringGoal').textContent=minsToStr(goalMins);
  document.getElementById('ringPct').textContent=Math.round(pct*100)+'%';
  renderWidgets();
}

function renderStudy(){
  const el=document.getElementById('subjectList');el.innerHTML='';
  subjects.forEach((s,si)=>{
    const tot=s.books.reduce((a,b)=>a+(state.study[s.id]?.[b.id]||0),0);
    const div=document.createElement('div');div.className='card';div.style.marginBottom='10px';
    const bHtml=s.books.map((b,bi)=>{const m=state.study[s.id]?.[b.id]||0;const running=timerActive&&timerSi===si&&timerBi===bi;return `<div class="book-row"><span class="book-name" title="${b.name}">${b.name}</span><div class="book-ctrl"><button class="step-btn" onclick="changeBook(${si},${bi},-5)">−</button><input class="book-mins-input" type="number" min="0" value="${m}" id="bm_${si}_${bi}" onchange="setBook(${si},${bi},+this.value)" oninput="setBook(${si},${bi},+this.value)"><button class="step-btn" onclick="changeBook(${si},${bi},5)">+</button><button class="timer-start-btn${running?' running':''}" id="tbtn_${si}_${bi}" onclick="handleTimerBtn(${si},${bi})">${running?'⏸':'▶'}</button><button class="del-btn" onclick="delBook(${si},${bi})">×</button></div></div>`;}).join('');
    div.innerHTML=`<div class="subj-header" onclick="toggleSubj(${si})"><div class="subj-name">${s.name}</div><div style="display:flex;align-items:center;gap:6px"><span id="stot_${si}" style="font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--accent)">${tot}min</span><span id="sarr_${si}" class="subj-arrow">▶</span></div></div><div class="subj-books" id="books_${si}">${bHtml}<button class="add-btn" onclick="openModal('book',${si})">+ Add Textbook</button><button class="add-btn" style="border-color:var(--red);color:var(--red);margin-top:4px" onclick="delSubject(${si})">Delete Subject</button></div>`;
    el.appendChild(div);
  });
}
function toggleSubj(si){const b=document.getElementById('books_'+si);const a=document.getElementById('sarr_'+si);const o=b.classList.toggle('open');a.classList.toggle('open',o);}
function setBook(si,bi,val){const s=subjects[si];const b=s.books[bi];const m=Math.max(0,Math.round(val)||0);if(!state.study[s.id])state.study[s.id]={};state.study[s.id][b.id]=m;const inp=document.getElementById('bm_'+si+'_'+bi);if(inp&&+inp.value!==m)inp.value=m;const tot=s.books.reduce((a,b2)=>a+(state.study[s.id]?.[b2.id]||0),0);const te=document.getElementById('stot_'+si);if(te)te.textContent=tot+'min';saveState();updateRing();calcScore();}
function changeBook(si,bi,d){const cur=state.study[subjects[si].id]?.[subjects[si].books[bi].id]||0;setBook(si,bi,cur+d);}
function delBook(si,bi){if(!confirm('削除しますか？'))return;subjects[si].books.splice(bi,1);saveSubjects();renderStudy();}
function delSubject(si){if(!confirm('科目ごと削除しますか？'))return;subjects.splice(si,1);saveSubjects();renderStudy();updateRing();}

let timerActive=false,timerRunning=false;let timerInterval=null,timerElapsed=0,timerAddedMins=0;let timerSi=-1,timerBi=-1;
function handleTimerBtn(si,bi){if(timerActive&&timerSi===si&&timerBi===bi){showTimer();return;}if(timerActive){if(!confirm('別の参考書のタイマーに切り替えますか？'))return;stopTimer(false);}startTimer(si,bi);}
function startTimer(si,bi){timerSi=si;timerBi=bi;timerElapsed=0;timerAddedMins=0;timerActive=true;timerRunning=true;const s=subjects[si],b=s.books[bi];document.getElementById('timerSubjectName').textContent=s.name.toUpperCase();document.getElementById('timerBookName').textContent=b.name;document.getElementById('timerPlayPause').textContent='⏸';document.getElementById('timerPauseNote').textContent='';showTimer();clearInterval(timerInterval);timerInterval=setInterval(tick,1000);renderStudy();}
function tick(){if(!timerRunning)return;timerElapsed++;updateTimerUI();const mins=Math.floor(timerElapsed/60);if(mins>timerAddedMins){timerAddedMins=mins;changeBook(timerSi,timerBi,1);}}
function updateTimerUI(){const m=Math.floor(timerElapsed/60),s=timerElapsed%60;const str=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');document.getElementById('timerDisplay').textContent=str;document.getElementById('timerMiniTime').textContent=str;const cyc=25*60,pct=(timerElapsed%cyc)/cyc,circ=2*Math.PI*105;document.getElementById('timerRingFill').style.strokeDashoffset=circ*(1-pct);}
function toggleTimer(){timerRunning=!timerRunning;document.getElementById('timerPlayPause').textContent=timerRunning?'⏸':'▶';document.getElementById('timerPauseNote').textContent=timerRunning?'':'一時停止中 — Minimizeでタブに戻れます';}
function confirmResetTimer(){if(confirm('タイマーをリセット（記録は保持）しますか？')){timerElapsed=0;timerAddedMins=0;updateTimerUI();}}
function confirmStopTimer(){if(confirm('タイマーを終了して記録を保存しますか？'))stopTimer(true);}
function stopTimer(save){clearInterval(timerInterval);timerInterval=null;timerActive=false;timerRunning=false;document.getElementById('timerOverlay').classList.remove('active');document.getElementById('timerMini').classList.remove('visible');if(save)saveState();renderStudy();}
function minimizeTimer(){timerRunning=false;document.getElementById('timerPlayPause').textContent='▶';document.getElementById('timerOverlay').classList.remove('active');const b=timerBi>=0?subjects[timerSi]?.books[timerBi]?.name:'';document.getElementById('timerMiniText').textContent=(b||'Timer')+' — paused';document.getElementById('timerMini').classList.add('visible');}
function showTimer(){document.getElementById('timerOverlay').classList.add('active');document.getElementById('timerMini').classList.remove('visible');}

function renderChecks(){
  const el=document.getElementById('checklist');el.innerHTML='';
  checkItems.forEach((c,i)=>{
    const done=!!state.checks[c.id];
    const div=document.createElement('div');
    div.className='check-item'+(done?' done':'');
    
    const checkBox=document.createElement('div');
    checkBox.className='check-box'+(done?' done':'');
    checkBox.onclick=()=>toggleCheck(c.id,checkBox);
    
    const label=document.createElement('span');
    label.className='check-label';
    label.textContent=c.label;
    label.onclick=()=>toggleCheck(c.id,checkBox);
    
    const delBtn=document.createElement('button');
    delBtn.className='check-del';
    delBtn.textContent='×';
    delBtn.type='button';
    delBtn.onclick=(e)=>{
      e.preventDefault();
      e.stopPropagation();
      if(confirm('削除しますか？')){
        checkItems.splice(i,1);
        saveChecks();
        renderChecks();
        calcScore();
        saveState();
      }
    };
    
    div.appendChild(checkBox);
    div.appendChild(label);
    div.appendChild(delBtn);
    el.appendChild(div);
  });
}
function toggleCheck(id,box){state.checks[id]=!state.checks[id];const done=state.checks[id];box.closest('.check-item').className='check-item'+(done?' done':'');box.className='check-box'+(done?' done':'');saveState();calcScore();}

// ===== EXERCISE =====
function renderExercise(){renderCardio();renderStrength();}

function renderCardio(){
  const el=document.getElementById('cardioList');el.innerHTML='';
  cardioList.forEach((ex,i)=>{
    const data=state.cardio[ex.id]||{distance:0,speed:0};
    const div=document.createElement('div');div.className='ex-card';
    div.innerHTML=`<div class="ex-header" onclick="this.nextElementSibling.classList.toggle('open')">
      <div class="ex-title">${ex.name}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--green)">${data.distance||0}km / ${data.speed||0}km/h</span>
        <button class="del-btn" style="width:20px;height:20px" onclick="delCardioEx(${i}); event.stopPropagation();">×</button>
        <span style="font-size:10px;color:var(--muted)">▶</span>
      </div>
    </div>
    <div class="ex-body">
      <div class="ex-set-row">
        <span class="ex-set-name">距離</span>
        <input class="ex-num-input" type="number" min="0" step="0.1" value="${data.distance||0}" style="color:var(--green)" oninput="setCardio('${ex.id}','distance',+this.value)">
        <span class="ex-unit">km</span>
      </div>
      <div class="ex-set-row">
        <span class="ex-set-name">速度</span>
        <input class="ex-num-input" type="number" min="0" step="0.5" value="${data.speed||0}" style="color:var(--green)" oninput="setCardio('${ex.id}','speed',+this.value)">
        <span class="ex-unit">km/h</span>
      </div>
    </div>`;
    el.appendChild(div);
  });
}
function setCardio(id,field,v){
  if(!state.cardio[id])state.cardio[id]={distance:0,speed:0};
  state.cardio[id][field]=Math.max(0,v||0);
  saveState();calcScore();
  renderCardio();
}
function delCardioEx(i){if(!confirm('削除しますか？'))return;cardioList.splice(i,1);saveCardio();renderCardio();}
function renderStrength(){
  const el=document.getElementById('strengthList');el.innerHTML='';
  strengthList.forEach((ex,i)=>{
    const notes=state.strength[ex.id]||[];
    const div=document.createElement('div');div.className='ex-card';
    
    let notesHtml='';
    notes.forEach((note,ni)=>{
      notesHtml+=`<div class="strength-note">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;color:var(--muted)">Set ${ni+1}</span>
          <button class="del-btn" onclick="delStrNote('${ex.id}',${ni})" style="width:16px;height:16px;font-size:12px">×</button>
        </div>
        <div class="strength-input-row">
          <input class="strength-num" type="number" min="0" value="${note.reps||0}" placeholder="rep" style="color:var(--accent2)" oninput="setStrNote('${ex.id}',${ni},'reps',+this.value)">
          <input class="strength-num" type="number" min="0" value="${note.weight||0}" placeholder="kg" style="color:var(--accent2)" oninput="setStrNote('${ex.id}',${ni},'weight',+this.value)">
          <input class="strength-note-memo" type="text" value="${note.memo||''}" placeholder="memo" oninput="setStrNote('${ex.id}',${ni},'memo',this.value)">
        </div>
      </div>`;
    });
    
    div.innerHTML=`<div class="ex-header" onclick="this.nextElementSibling.classList.toggle('open')">
      <div class="ex-title">${ex.name}</div>
      <span style="font-size:10px;color:var(--muted)">▶</span>
    </div>
    <div class="ex-body">

  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const id='v'+Date.now()+processed;
      const videos=JSON.parse(localStorage.getItem('ym4_videos')||'[]');

  });

function renderRecord(){
  const keys=Object.keys(allData).sort();
  const now=new Date();
  
  let filteredKeys=keys;
  if(recordPeriod>0){
    const cutoff=new Date(now.getTime()-recordPeriod*24*60*60*1000).toISOString().slice(0,10);
    filteredKeys=keys.filter(k=>k>=cutoff);
  }
  
  if(filteredKeys.length===0){
    document.getElementById('recordList').innerHTML='<div class="empty-record">No records yet.<br>Start logging today!</div>';
    document.getElementById('recordStats').innerHTML='<div class="card" style="text-align:center;margin-bottom:0"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">平均</div><div style="font-family:\'Bebas Neue\',sans-serif;font-size:24px;color:var(--accent)">—</div></div><div class="card" style="text-align:center;margin-bottom:0"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">最高</div><div style="font-family:\'Bebas Neue\',sans-serif;font-size:24px;color:var(--accent)">—</div></div>';
    return;
  }
  
  // Calculate scores
  const scores=filteredKeys.map(k=>({date:k,score:calcScoreFor(allData[k])}));
  const avgScore=Math.round(scores.reduce((a,b)=>a+b.score,0)/scores.length);
  const maxScore=Math.max(...scores.map(s=>s.score));
  
  document.getElementById('recordAvg').textContent=avgScore;
  document.getElementById('recordMax').textContent=maxScore;
  
  // Draw graph
  drawScoreGraph(scores);
  
  // List
  const el=document.getElementById('recordList');
  el.innerHTML='';
  filteredKeys.forEach(k=>{
    const r=allData[k];
    const sc=calcScoreFor(r);
    const sm=subjects.reduce((a,s)=>a+s.books.reduce((a2,b)=>a2+(r.study?.[s.id]?.[b.id]||0),0),0);
    const ch=Object.values(r.checks||{}).filter(Boolean).length;
    const div=document.createElement('div');
    div.className='record-day';
    div.innerHTML=`<div class="record-header" onclick="this.nextElementSibling.classList.toggle('open')">
      <div><div class="record-date-txt">${k}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${minsToStr(sm)}</div></div>
      <div class="record-score">${sc}</div>
    </div>
    <div class="record-body">
      <div class="record-item"><span>Study</span><span class="record-val">${minsToStr(sm)}</span></div>
      <div class="record-item"><span>Checks</span><span class="record-val">${ch}/${checkItems.length}</span></div>
      <div class="record-item"><span>Exercise</span><span class="record-val">${r.health?.exercise||0}min</span></div>
      <div class="record-item"><span>Meal</span><span class="record-val">${r.health?.meal||0}/5</span></div>
    </div>`;
    el.appendChild(div);
  });
}

function drawScoreGraph(scores){
  const svg=document.getElementById('scoreChart');
  svg.innerHTML='';
  
  const w=400,h=300,padding=40;
  const graphW=w-padding*2,graphH=h-padding*2;
  
  // Draw axes
  const axes=document.createElementNS('http://www.w3.org/2000/svg','g');
  axes.innerHTML=`
    <line x1="${padding}" y1="${h-padding}" x2="${w-padding}" y2="${h-padding}" stroke="var(--border)" stroke-width="1"/>
    <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${h-padding}" stroke="var(--border)" stroke-width="1"/>
    <text x="10" y="${padding-10}" font-size="10" fill="var(--muted)">100</text>
    <text x="10" y="${h-padding+15}" font-size="10" fill="var(--muted)">0</text>
  `;
  svg.appendChild(axes);
  
  // Draw line
  const points=scores.map((s,i)=>{
    const x=padding+(i/(scores.length-1||1))*graphW;
    const y=h-padding-(s.score/100)*graphH;
    return `${x},${y}`;
  }).join(' ');
  
  const line=document.createElementNS('http://www.w3.org/2000/svg','polyline');
  line.setAttribute('points',points);
  line.setAttribute('stroke','var(--accent)');
  line.setAttribute('stroke-width','2');
  line.setAttribute('fill','none');
  svg.appendChild(line);
  
  // Draw points
  scores.forEach((s,i)=>{
    const x=padding+(i/(scores.length-1||1))*graphW;
    const y=h-padding-(s.score/100)*graphH;
    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',x);
    circle.setAttribute('cy',y);
    circle.setAttribute('r','3');
    circle.setAttribute('fill','var(--accent)');
    svg.appendChild(circle);
  });
}

function calcScoreFor(r){
  const sm=subjects.reduce((a,s)=>a+s.books.reduce((a2,b)=>a2+(r.study?.[s.id]?.[b.id]||0),0),0);
  
  // 70% Study
  const studyScore=Math.min(70,sm/6*7);
  
  // 10% Exercise
  const exScore=Math.min(10,(r.health?.exercise||0)/30);
  
  // 10% Meal
  const mealScore=(r.health?.meal||0)*2;
  
  // 10% Other (checks + diary)
  const n=Math.max(1,checkItems.length);
  const checkScore=(Object.values(r.checks||{}).filter(Boolean).length/n)*5;
  const diaryScore=((r.diary?.length||0)>10?5:0);
  const otherScore=checkScore+diaryScore;
  
  return Math.min(100,Math.round(studyScore+exScore+mealScore+otherScore));
}

function handleSwipe(){
  if(touchEndX<touchStartX-50){
    // Swipe left - next tab
    const active=document.querySelector('.tab-btn.active');
    const idx=Array.from(document.querySelectorAll('.tab-btn')).indexOf(active);
    if(idx<tabOrder.length-1){
      const nextBtn=document.querySelectorAll('.tab-btn')[idx+1];
      nextBtn.click();
    }
  }else if(touchEndX>touchStartX+50){
    // Swipe right - prev tab
    const active=document.querySelector('.tab-btn.active');
    const idx=Array.from(document.querySelectorAll('.tab-btn')).indexOf(active);
    if(idx>0){
      const prevBtn=document.querySelectorAll('.tab-btn')[idx-1];
      prevBtn.click();
    }
  }
}
