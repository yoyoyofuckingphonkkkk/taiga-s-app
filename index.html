html,body{background:var(--black);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;position:relative;font-weight:300;letter-spacing:0.02em}
body::before{content:'';position:fixed;inset:0;background-image:var(--wallpaper-url);background-size:cover;background-position:left top;-webkit-mask-image:linear-gradient(135deg,rgba(0,0,0,1) 0%,rgba(0,0,0,0.8) 30%,rgba(0,0,0,0.4) 60%,rgba(0,0,0,0) 100%);mask-image:linear-gradient(135deg,rgba(0,0,0,1) 0%,rgba(0,0,0,0.8) 30%,rgba(0,0,0,0.4) 60%,rgba(0,0,0,0) 100%);pointer-events:none;z-index:0}
.app{max-width:430px;margin:0 auto;padding-bottom:80px;background:rgba(0,0,0,0.85);min-height:100vh;backdrop-filter:blur(2px);position:relative;z-index:1}
.ring-section{padding:28px 20px 16px;text-align:center}
.widgets-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:12px;grid-auto-flow:dense}
.widget{background:var(--surface);border:0.5px solid var(--border);border-radius:4px;padding:16px;position:relative}
.widget.main-widget{grid-column:1}
.widget.sub-widget{grid-column:1;display:grid;grid-template-columns:120px 1fr;gap:12px;align-items:center}
.widget.sub-widget .ring-wrap{width:120px;height:120px}
.widget.sub-widget .ring-svg{width:120px;height:120px}
.widget.sub-widget .ring-center{width:80px}
.widget.sub-widget .ring-current{font-size:22px}
.widget.sub-widget .ring-sep{font-size:8px}
.widget.sub-widget .ring-goal-txt{font-size:10px}
.widget.sub-widget .ring-pct{font-size:9px}
.widget-close{position:absolute;top:8px;right:8px;width:24px;height:24px;border:none;background:none;color:var(--muted2);font-size:16px;cursor:pointer;padding:0;line-height:1}
.top-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.app-title{font-family:var(--serif);font-size:22px;letter-spacing:.15em;color:var(--text);font-weight:500;font-style:italic}
.app-date{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.15em;text-transform:uppercase;font-weight:300}
.top-score-box{text-align:right;cursor:pointer}
.top-score-n{font-family:var(--serif);font-size:36px;color:var(--gold);line-height:1;font-weight:400;font-style:italic}
.top-score-l{font-size:8px;letter-spacing:.3em;color:var(--muted);margin-top:2px;text-transform:uppercase}
.ring-wrap{position:relative;width:190px;height:190px;margin:0 auto 6px}
.ring-svg{width:190px;height:190px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--surface3);stroke-width:13}
.ring-fill{fill:none;stroke:var(--gold);stroke-width:13;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 0 12px rgba(212,175,55,.4))}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:130px}
.ring-current{font-family:var(--display);font-size:38px;line-height:1;color:var(--gold);font-weight:400;letter-spacing:.05em}
.ring-sep{font-size:8px;color:var(--muted);margin:3px 0;letter-spacing:.3em}
.ring-goal-txt{font-size:11px;color:var(--muted);font-family:var(--display);letter-spacing:.1em}
.ring-pct{font-size:10px;color:var(--gold);margin-top:3px;letter-spacing:.2em;font-style:italic;font-family:var(--serif)}
.ring-label{font-size:9px;letter-spacing:.4em;color:var(--muted);margin-top:8px;text-transform:uppercase;font-weight:400}
.goal-row{display:flex;justify-content:center;gap:8px;margin-top:8px}
.goal-btn{background:none;border:0.5px solid var(--border2);color:var(--muted);font-size:11px;padding:4px 12px;border-radius:20px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.tab-bar{display:flex;overflow-x:auto;border-bottom:0.5px solid var(--border);background:rgba(0,0,0,0.95);backdrop-filter:blur(10px)}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;flex:1;min-width:55px;padding:14px 4px 12px;font-size:9px;letter-spacing:.25em;color:var(--muted);background:none;border:none;border-bottom:1px solid transparent;cursor:pointer;white-space:nowrap;font-family:var(--display);transition:color .2s ease,border-color .2s ease,transform .15s ease;font-weight:400;text-transform:uppercase}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-btn:active{transform:scale(.92)}
.section{display:none;padding:18px 14px 0;animation:fi .2s ease}
.section.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes heroFadeIn{from{opacity:0;transform:scale(1.04)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes tabIndIn{from{opacity:0;transform:scaleX(0)}to{opacity:1;transform:scaleX(1)}}
.sec-label{font-family:var(--serif);font-size:24px;letter-spacing:.02em;color:var(--text);margin-bottom:20px;font-weight:400;font-style:italic;position:relative;padding-bottom:12px}
.sec-label::after{content:'';position:absolute;bottom:0;left:0;width:40px;height:1px;background:var(--gold)}
.sec-label::before{content:attr(data-num);position:absolute;top:-4px;right:0;font-family:var(--display);font-size:11px;color:var(--muted);letter-spacing:.2em;font-style:normal;font-weight:400}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:4px;padding:18px;margin-bottom:12px}
.subj-header{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border);cursor:pointer}
.subj-name{font-size:14px;font-weight:500}
.subj-arrow{font-size:10px;color:var(--muted);transition:.2s;margin-left:8px}
.subj-arrow.open{transform:rotate(90deg)}
.subj-books{padding:6px 0 2px;display:none}
.subj-books.open{display:block}
.book-row{display:flex;align-items:center;gap:5px;padding:8px 0;border-bottom:0.5px solid var(--border2)}
.book-row:last-child{border-bottom:none}
.book-name{font-size:13px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.book-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.step-btn{width:26px;height:26px;border-radius:7px;border:0.5px solid var(--border2);background:var(--surface3);color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.book-mins-input{width:50px;height:26px;background:var(--surface3);border:0.5px solid var(--border2);border-radius:7px;color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:14px;text-align:center;padding:0 3px}
.book-mins-input:focus{outline:none;border-color:var(--accent)}
.timer-start-btn{width:26px;height:26px;border-radius:7px;border:0.5px solid var(--accent3);background:none;color:var(--accent3);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.timer-start-btn.running{background:var(--accent3);color:var(--black)}
.del-btn{width:22px;height:22px;border:none;background:none;color:var(--muted2);font-size:16px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
.add-btn{width:100%;margin-top:8px;padding:9px;border-radius:10px;border:0.5px dashed var(--border2);background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.health-subtab-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:8px 12px;border-bottom:2px solid transparent;transition:.2s;font-family:'Noto Sans JP',sans-serif}
.health-subtab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.add-btn:active{background:var(--surface2)}
.check-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:0.5px solid var(--border)}
.check-item:last-child{border-bottom:none}
.check-box{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--border2);background:none;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.check-box.done{background:var(--accent);border-color:var(--accent)}
.check-box.done::after{content:'✓';font-size:12px;color:var(--black);font-weight:700}
.check-label{font-size:13px;cursor:pointer;flex:1}
.check-item.done .check-label{color:var(--muted);text-decoration:line-through}
.check-del{width:24px;height:24px;border:none;background:none;color:var(--red);font-size:18px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;transition:.15s}
.check-del:active{opacity:.6}
.health-section-label{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:14px 0 8px}
.health-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px}
.health-card{background:var(--surface);border:0.5px solid var(--border);border-radius:13px;padding:12px 8px;text-align:center}
.health-val{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;margin-bottom:2px}
.health-label{font-size:10px;color:var(--text2);margin-bottom:8px}
.h-ctrl{display:flex;justify-content:center;align-items:center;gap:5px}
.ex-card{background:var(--surface);border:0.5px solid var(--border);border-radius:13px;margin-bottom:8px;overflow:hidden}
.ex-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer}
.ex-title{font-size:13px;font-weight:500}
.ex-body{padding:0 14px 10px;display:none}
.ex-body.open{display:block}
.ex-set-row{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:0.5px solid var(--border2);font-size:13px}
.ex-set-row:last-child{border-bottom:none}
.ex-set-name{flex:1;color:var(--text2)}
.ex-num-input{width:52px;height:26px;background:var(--surface3);border:0.5px solid var(--border2);border-radius:7px;font-family:'Bebas Neue',sans-serif;font-size:14px;text-align:center;padding:0 4px}
.ex-num-input:focus{outline:none}
.ex-unit{font-size:11px;color:var(--muted);min-width:24px}
.strength-note{background:var(--surface2);border-radius:10px;padding:10px;margin-bottom:8px;border:0.5px solid var(--border2)}
.strength-input-row{display:flex;gap:6px;align-items:center}
.strength-num{width:50px;height:24px;background:var(--surface3);border:0.5px solid var(--border2);border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:12px;text-align:center;padding:0 4px}
.strength-num:focus{outline:none;border-color:var(--accent2)}
.strength-note-memo{flex:1;height:24px;background:var(--surface3);border:0.5px solid var(--border2);border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:0 6px;color:var(--text2)}
.strength-note-memo:focus{outline:none;border-color:var(--accent2)}
.record-filter-btn{padding:7px 12px;border-radius:16px;border:0.5px solid var(--border2);background:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;flex-shrink:0;transition:.15s}
.record-filter-btn.active{background:var(--accent);color:var(--black);border-color:var(--accent)}
.diary-date-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.diary-date-label{font-size:12px;color:var(--muted);white-space:nowrap}
.diary-date-input{flex:1;background:var(--surface2);border:0.5px solid var(--border2);border-radius:9px;padding:7px 11px;color:var(--text);font-size:13px;font-family:'Noto Sans JP',sans-serif}
.diary-date-input:focus{outline:none;border-color:var(--accent)}
.diary-area{width:100%;background:var(--surface);border:0.5px solid var(--border);border-radius:13px;padding:13px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;line-height:1.8;resize:none;min-height:200px}
.diary-area:focus{outline:none;border-color:var(--accent)}
.diary-save{width:100%;margin-top:10px;padding:12px;border-radius:12px;border:none;background:var(--accent);color:var(--black);font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.diary-saved{font-size:12px;color:var(--green);text-align:center;margin-top:8px;opacity:0;transition:.3s}
.diary-saved.show{opacity:1}
.feed-card{background:var(--surface);border:0.5px solid var(--border);border-radius:15px;padding:15px;margin-bottom:10px;position:relative;overflow:hidden;transition:transform .15s ease,box-shadow .15s ease}
.feed-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent4)}
.feed-tag{font-size:10px;letter-spacing:.15em;color:var(--accent4);margin-bottom:6px;text-transform:uppercase}
.feed-title{font-size:15px;font-weight:500;line-height:1.4;margin-bottom:7px}
.feed-body{font-size:13px;color:var(--text2);line-height:1.7}
.feed-refresh{width:100%;padding:11px;border-radius:12px;border:0.5px solid var(--border2);background:none;color:var(--muted);font-size:13px;cursor:pointer;margin-top:4px;font-family:'Noto Sans JP',sans-serif}
.record-day{background:var(--surface);border:0.5px solid var(--border);border-radius:13px;margin-bottom:8px;overflow:hidden}
.record-header{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer}
.record-date-txt{font-size:13px;font-weight:500}
.record-score{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent)}
.record-body{padding:2px 14px 13px;display:none;border-top:0.5px solid var(--border)}
.record-body.open{display:block}
.record-item{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:0.5px solid var(--border2)}
.record-item:last-child{border-bottom:none}
.record-val{color:var(--accent3)}
.empty-record{text-align:center;color:var(--muted);font-size:13px;padding:40px 0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.25s}
.modal-bg.open{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:430px;transform:translateY(40px);transition:.25s}
.modal-bg.open .modal{transform:translateY(0)}
.modal-title{font-size:15px;font-weight:500;margin-bottom:14px}
.modal-input{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:10px;padding:11px 13px;color:var(--text);font-size:14px;font-family:'Noto Sans JP',sans-serif;margin-bottom:8px}
.modal-input:focus{outline:none;border-color:var(--accent)}
.modal-row{display:flex;gap:8px;margin-bottom:8px}
.modal-row .modal-input{margin-bottom:0;flex:1}
.modal-ok{width:100%;padding:12px;border-radius:11px;border:none;background:var(--accent);color:var(--black);font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-bottom:8px}
.modal-cancel{width:100%;padding:10px;border-radius:11px;border:0.5px solid var(--border2);background:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.timer-overlay{position:fixed;inset:0;background:var(--black);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s}
.timer-overlay.active{opacity:1;pointer-events:auto}
.timer-subject-name{font-size:12px;letter-spacing:.2em;color:var(--muted);margin-bottom:4px;text-transform:uppercase}
.timer-book-name{font-size:16px;color:var(--text2);margin-bottom:36px;text-align:center;padding:0 20px}
.timer-ring-wrap{position:relative;width:240px;height:240px;margin-bottom:30px}
.timer-ring-svg{width:240px;height:240px;transform:rotate(-90deg)}
.timer-ring-bg{fill:none;stroke:var(--surface3);stroke-width:10}
.timer-ring-fill{fill:none;stroke:var(--accent3);stroke-width:10;stroke-linecap:round;filter:drop-shadow(0 0 12px rgba(71,180,255,.5))}
.timer-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.timer-display{font-family:'Bebas Neue',sans-serif;font-size:58px;color:var(--accent3);line-height:1;letter-spacing:.04em}
.timer-elapsed-label{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.12em}
.timer-controls{display:flex;gap:14px;margin-bottom:24px}
.timer-ctrl-btn{width:62px;height:62px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.timer-ctrl-btn.primary{background:var(--accent3);border-color:var(--accent3);color:var(--black);font-size:22px}
.timer-ctrl-btn:active{transform:scale(.93)}
.timer-pause-note{font-size:11px;color:var(--muted);text-align:center;margin-bottom:20px;padding:0 20px}
.timer-minimize{padding:10px 24px;border-radius:20px;border:0.5px solid var(--border2);background:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.timer-mini{display:none;background:var(--surface);border:0.5px solid var(--accent3);border-radius:12px;margin:0 14px 10px;padding:10px 14px;align-items:center;gap:10px;cursor:pointer}
.timer-mini.visible{display:flex}
.timer-mini-dot{width:8px;height:8px;border-radius:50%;background:var(--accent3);flex-shrink:0;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.timer-mini-text{font-size:12px;flex:1;color:var(--text2)}
.timer-mini-time{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--accent3)}
.timer-mini-resume{font-size:11px;color:var(--accent3);padding:4px 10px;border:0.5px solid var(--accent3);border-radius:8px;background:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;flex-shrink:0}
.hero-section{margin:-18px -14px 20px -14px;height:180px;overflow:hidden;position:relative}
.hero-img{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.9) 100%)}
.hero-text{position:absolute;bottom:16px;left:20px;right:20px}
.hero-title{font-family:var(--serif);font-size:28px;color:#fff;font-style:italic;line-height:1.1;letter-spacing:.02em}
.hero-subtitle{font-family:var(--display);font-size:10px;color:rgba(255,255,255,0.8);letter-spacing:.3em;margin-top:6px;text-transform:uppercase}
.hero-controls{position:absolute;top:8px;right:8px;display:flex;gap:6px;opacity:0;transition:.2s;pointer-events:none}
.hero-controls.visible{opacity:1;pointer-events:auto}
.hero-btn{background:rgba(0,0,0,0.6);border:0.5px solid rgba(255,255,255,0.3);color:#fff;border-radius:4px;padding:6px 10px;font-size:10px;cursor:pointer;font-family:var(--sans);letter-spacing:.05em}
.hero-btn:hover{background:rgba(0,0,0,0.8)}
</style>
</head>

<script>

// ===== HERO IMAGES & TEXT =====
let heroData=JSON.parse(localStorage.getItem('ym4_heroes')||'null')||{

  check:{img:'',vid:'',title:'Discipline',subtitle:'Daily Habits',zoom:1,posX:50,posY:50},
  health:{img:'',vid:'',title:'Health',subtitle:'Mind & Body',zoom:1,posX:50,posY:50},
  diary:{img:'',vid:'',title:'Journal',subtitle:'Reflection',zoom:1,posX:50,posY:50},
  record:{img:'',vid:'',title:'The Record',subtitle:'A Legacy in Motion',zoom:1,posX:50,posY:50},

};

function saveHeroData(){localStorage.setItem('ym4_heroes',JSON.stringify(heroData));}

function renderHero(tabName){
  const h=heroData[tabName];
  if(!h) return '';
  const hasImg=h.img && h.img.length>0;
  const hasVid=h.vid && h.vid.length>0;
  const hasMedia=hasImg||hasVid;
  const hasContent=hasMedia || (h.title && h.title.trim()) || (h.subtitle && h.subtitle.trim());
  if(!hasContent){
    return `<div style="margin:-20px -20px 16px -20px;display:flex;align-items:center;justify-content:center;min-height:60px;background:var(--surface);border-bottom:0.5px solid var(--border)">
      <button onclick="openHeroEditor('${tabName}')" style="background:none;border:1px dashed var(--muted);color:var(--muted);font-size:11px;letter-spacing:.2em;padding:8px 20px;border-radius:4px;cursor:pointer;font-family:var(--display)">+ ADD MEDIA & TEXT</button>
    </div>`;
  }
  const mediaHtml = hasVid
    ? `<video class="hero-img" src="${h.vid}" autoplay muted loop playsinline style="object-fit:cover;object-position:${h.posX||50}% ${h.posY||50}%"></video>`
    : hasImg
      ? `<img class="hero-img" src="${h.img}" alt="" style="object-position:${h.posX||50}% ${h.posY||50}%;transform:scale(${h.zoom||1})">`
      : `<div style="position:absolute;inset:0;background:linear-gradient(135deg,#111 0%,#222 100%)"></div>`;
  return `<div class="hero-section" id="hero-wrap-${tabName}" onclick="heroToggleEdit('${tabName}')">
    ${mediaHtml}
    <div class="hero-overlay"></div>
    <div class="hero-text">
      <div class="hero-title">${h.title||''}</div>
      <div class="hero-subtitle">${h.subtitle||''}</div>
    </div>
    <div class="hero-controls" id="hero-ctrl-${tabName}">
      <button class="hero-btn" onclick="event.stopPropagation();openHeroEditor('${tabName}')" ontouchstart="event.stopPropagation()">✎ Edit</button>
    </div>
  </div>`;
}

function heroToggleEdit(tabName){
  const ctrl=document.getElementById('hero-ctrl-'+tabName);
  if(!ctrl) return;
  const isVisible=ctrl.classList.contains('visible');
  // 全部閉じる
  document.querySelectorAll('.hero-controls').forEach(el=>el.classList.remove('visible'));
  if(!isVisible) ctrl.classList.add('visible');
  // 外クリックリスナー設置
  setTimeout(()=>{
    document.addEventListener('click',closeHeroCtrlOnOutside,{once:true});
  },50);
}

function closeHeroCtrlOnOutside(e){
  // 直近のhero-sectionの中か確認
  const heroSect=e.target.closest('.hero-section');
  if(heroSect) return; // 内側なら何もしない
  // 外側ならすべてクローズ
  document.querySelectorAll('.hero-controls.visible').forEach(el=>el.classList.remove('visible'));
}

function openHeroEditor(tabName){
  const h=heroData[tabName]||{img:'',vid:'',title:'',subtitle:'',posX:50,posY:50,zoom:1};
  const hasImg=h.img && h.img.length>0;
  const hasVid=h.vid && h.vid.length>0;
  const overlay=document.createElement('div');
  overlay.className='modal-bg open';
  overlay.id='heroEditorOverlay';
  const previewHtml = hasVid
    ? `<div style="width:100%;height:120px;border-radius:8px;overflow:hidden;margin-bottom:10px;position:relative">
        <video src="${h.vid}" autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover"></video>
        <button onclick="deleteHeroMedia('${tabName}')" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:11px;padding:4px 8px;border-radius:4px;cursor:pointer">✕</button>
       </div>`
    : hasImg
      ? `<div style="width:100%;height:120px;border-radius:8px;overflow:hidden;margin-bottom:10px;position:relative">
          <img src="${h.img}" style="width:100%;height:100%;object-fit:cover">
          <button onclick="deleteHeroMedia('${tabName}')" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:11px;padding:4px 8px;border-radius:4px;cursor:pointer">✕</button>
         </div>`
      : '';
  const adjustHtml = hasImg ? `
    <div style="margin-bottom:16px;padding:12px;background:var(--surface2);border-radius:8px">
      <div style="font-size:11px;color:var(--muted);letter-spacing:.15em;margin-bottom:10px">ADJUST</div>
      <div style="margin-bottom:8px">
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px">Zoom: <span id="heroZoomVal">${Math.round((h.zoom||1)*100)}%</span></div>
        <input type="range" id="heroZoom" min="100" max="300" value="${Math.round((h.zoom||1)*100)}" style="width:100%" oninput="heroAdjustPreview('${tabName}')">
      </div>
      <div style="margin-bottom:8px">
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px">Position X: <span id="heroPosXVal">${h.posX||50}%</span></div>
        <input type="range" id="heroPosX" min="0" max="100" value="${h.posX||50}" style="width:100%" oninput="heroAdjustPreview('${tabName}')">
      </div>
      <div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px">Position Y: <span id="heroPosYVal">${h.posY||50}%</span></div>
        <input type="range" id="heroPosY" min="0" max="100" value="${h.posY||50}" style="width:100%" oninput="heroAdjustPreview('${tabName}')">
      </div>
      <div style="margin-top:10px;width:100%;height:80px;border-radius:6px;overflow:hidden;position:relative;border:0.5px solid var(--border)">
        <img id="heroAdjPreview" src="${h.img}" style="width:100%;height:100%;object-fit:cover;transform:scale(${h.zoom||1});object-position:${h.posX||50}% ${h.posY||50}%">
      </div>
    </div>` : '';
  overlay.innerHTML=`
    <div class="modal" style="max-height:90vh;overflow-y:auto">
      <div class="modal-title" style="margin-bottom:16px">Edit Banner</div>
      <div style="margin-bottom:12px">
        ${previewHtml}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <button onclick="uploadHeroImage('${tabName}')" style="padding:10px;background:var(--surface2);border:1px dashed var(--border);border-radius:8px;color:var(--text2);font-size:12px;cursor:pointer">📷 Photo</button>
          <button onclick="uploadHeroVideo('${tabName}')" style="padding:10px;background:var(--surface2);border:1px dashed var(--border);border-radius:8px;color:var(--text2);font-size:12px;cursor:pointer">🎬 Video</button>
        </div>
      </div>
      ${adjustHtml}
      <div style="margin-bottom:12px">
        <div style="font-size:11px;color:var(--muted);letter-spacing:.15em;margin-bottom:6px">TITLE</div>
        <input id="heroTitleInput" value="${h.title||''}" style="width:100%;padding:10px;background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;box-sizing:border-box" placeholder="e.g. ASCEND">
      </div>
      <div style="margin-bottom:20px">
        <div style="font-size:11px;color:var(--muted);letter-spacing:.15em;margin-bottom:6px">SUBTITLE</div>
        <input id="heroSubtitleInput" value="${h.subtitle||''}" style="width:100%;padding:10px;background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;box-sizing:border-box" placeholder="e.g. Master Every Day">
      </div>
      <button class="modal-ok" onclick="saveHeroEdit('${tabName}')">Save</button>
      <button class="modal-cancel" onclick="document.getElementById('heroEditorOverlay').remove()">Cancel</button>
    </div>`;
  document.body.appendChild(overlay);
}

function heroAdjustPreview(tabName){
  const zoom=document.getElementById('heroZoom');
  const posX=document.getElementById('heroPosX');
  const posY=document.getElementById('heroPosY');
  const prev=document.getElementById('heroAdjPreview');
  if(!zoom||!posX||!posY||!prev) return;
  const z=zoom.value/100;
  const x=posX.value;
  const y=posY.value;
  document.getElementById('heroZoomVal').textContent=zoom.value+'%';
  document.getElementById('heroPosXVal').textContent=x+'%';
  document.getElementById('heroPosYVal').textContent=y+'%';
  prev.style.transform=`scale(${z})`;
  prev.style.objectPosition=`${x}% ${y}%`;
}

function saveHeroEdit(tabName){
  const title=document.getElementById('heroTitleInput').value;
  const subtitle=document.getElementById('heroSubtitleInput').value;
  const zoomEl=document.getElementById('heroZoom');
  const posXEl=document.getElementById('heroPosX');
  const posYEl=document.getElementById('heroPosY');
  heroData[tabName].title=title;
  heroData[tabName].subtitle=subtitle;
  if(zoomEl) heroData[tabName].zoom=zoomEl.value/100;
  if(posXEl) heroData[tabName].posX=+posXEl.value;
  if(posYEl) heroData[tabName].posY=+posYEl.value;
  saveHeroData();
  document.getElementById('heroEditorOverlay').remove();
  renderHeroToDOM(tabName);
}

function renderHeroToDOM(tabName){
  const el=document.getElementById('hero-'+tabName);
  if(el) el.innerHTML=renderHero(tabName);
}

function editHero(tabName){ openHeroEditor(tabName); }

function deleteHeroMedia(tabName){
  heroData[tabName].img='';
  heroData[tabName].vid='';
  saveHeroData();
  const overlay=document.getElementById('heroEditorOverlay');
  if(overlay) overlay.remove();
  openHeroEditor(tabName);
  renderHeroToDOM(tabName);
}
function deleteHeroImg(tabName){ deleteHeroMedia(tabName); }

function uploadHeroImage(tabName){
  const input=document.createElement('input');
  input.type='file';
  input.accept='image/*';
  input.onchange=(e)=>{
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      heroData[tabName].img=ev.target.result;
      heroData[tabName].vid='';
      heroData[tabName].zoom=1;
      heroData[tabName].posX=50;
      heroData[tabName].posY=50;
      saveHeroData();
      const overlay=document.getElementById('heroEditorOverlay');
      if(overlay) overlay.remove();
      openHeroEditor(tabName);
      renderHeroToDOM(tabName);
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function uploadHeroVideo(tabName){
  const input=document.createElement('input');
  input.type='file';
  input.accept='video/mp4,video/mov,video/quicktime,video/*';
  input.onchange=(e)=>{
    const file=e.target.files[0];
    if(!file) return;
    // 動画サイズチェック (50MB上限)
    if(file.size > 50*1024*1024){
      alert('動画サイズは50MB以下にしてください');
      return;
    }
    const reader=new FileReader();
    reader.onload=(ev)=>{
      heroData[tabName].vid=ev.target.result;
      heroData[tabName].img='';
      saveHeroData();
      const overlay=document.getElementById('heroEditorOverlay');
      if(overlay) overlay.remove();
      openHeroEditor(tabName);
      renderHeroToDOM(tabName);
    };
    reader.readAsDataURL(file);
  };
  input.click();
}
let widgets=JSON.parse(localStorage.getItem('ym4_widgets')||'null')||['study'];

function saveWidgets(){localStorage.setItem('ym4_widgets',JSON.stringify(widgets));}

function addWidget(){
  const modal=document.createElement('div');
  modal.className='modal-bg open';
  modal.id='widgetModal';
  modal.innerHTML=`
    <div class="modal">
      <div class="modal-title">Add Widget</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="modal-ok" onclick="selectWidget('exercise')">Exercise</button>
        <button class="modal-ok" onclick="selectWidget('checks')">Checks</button>
        <button class="modal-ok" onclick="selectWidget('remaining-days')">残りd数</button>
        <button class="modal-cancel" onclick="document.getElementById('widgetModal').remove()">Cancel</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function selectWidget(w){
  if(!widgets.includes(w)){
    if(w==='remaining-days'){
      const title=prompt('タイトルを入力（例：受験dまで）:','受験dまで');
      if(!title)return;
      const date=prompt('d付を入力（YYYY-MM-DD）:',new Date(new Date().getFullYear(),11,31).toISOString().slice(0,10));
      if(!date)return;
      widgets.push({type:w,title,date});
    }else{
      widgets.push(w);
    }
    saveWidgets();
    renderWidgets();
  }
  document.getElementById('widgetModal')?.remove();
}

function removeWidget(w){
  if(w==='study'){alert('StudyウィジェットはDeleteできません');return;}
  widgets=widgets.filter(x=>(typeof x==='string'?x:x.type)!==w);
  saveWidgets();
  renderWidgets();
}

function renderWidgets(){
  const grid=document.getElementById('widgetsGrid');
  grid.innerHTML='';
  
  // Main widget
  const mainDiv=document.createElement('div');
  mainDiv.className='widget main-widget';

      <svg class="ring-svg" viewBox="0 0 190 190">

        <circle class="ring-fill" id="ringFill" cx="95" cy="95" r="78" stroke-dasharray="490" stroke-dashoffset="490"/>
      </svg>
      <div class="ring-center">
        <div class="ring-current" id="ringCurrent">0h 00m</div>
        <div class="ring-sep">/ GOAL</div>
        <div class="ring-goal-txt" id="ringGoal">6h 00m</div>
        <div class="ring-pct" id="ringPct">0%</div>
      </div>
    </div>
    <div class="ring-label">TODAY'S STUDY TIME</div>
    <div class="goal-row">
      <button class="goal-btn" onclick="openModal('goal')">⚙ Change Goal</button>
    </div>
  `;
  grid.appendChild(mainDiv);
  
  // Sub widgets
  widgets.forEach(w=>{
    const wType=typeof w==='string'?w:w.type;
    if(wType==='study')return;
    const div=document.createElement('div');
    div.className='widget sub-widget';
    
    if(wType==='exercise'){
      const exTime=state.health?.exercise||0;
      div.innerHTML=`
        <button class="widget-close" onclick="removeWidget('exercise')">×</button>

function calcCardioCalories(distance,time){
  if(!distance||!time)return 0;
  const bw=+(localStorage.getItem('ym4_bodyweight')||70);
  const speed=distance/(time/60); // km/h
  // MET from 2024 Compendium interpolation by speed
  let met;
  if(speed<=6.4)met=6.0;
  else if(speed<=8.0)met=8.3;
  else if(speed<=9.7)met=9.8;
  else if(speed<=11.3)met=10.5;
  else if(speed<=12.9)met=11.0;
  else if(speed<=14.5)met=11.8;
  else if(speed<=16.1)met=12.8;
  else if(speed<=17.7)met=14.5;
  else met=16.0;
  // Calories = MET × weight(kg) × duration(h)
  return Math.round(met*bw*(time/60));
}

function calcStrengthCalories(time,intensity){
  if(!time)return 0;
  const bw=+(localStorage.getItem('ym4_bodyweight')||70);
  // MET values from 2024 Compendium
  const metMap={light:3.5,moderate:5.0,hard:6.0,circuit:8.0};
  const met=metMap[intensity]||5.0;
  // Calories = 0.0175 × MET × weight(kg) × duration(min)
  return Math.round(0.0175*met*bw*time);
}

let db=null;
const DB_NAME='yuimei_videos';
const STORE_NAME='videos';

function initDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,1);
    req.onerror=()=>reject(req.error);
    req.onsuccess=()=>{db=req.result;resolve();};
    req.onupgradeneeded=(e)=>{
      const store=e.target.result.createObjectStore(STORE_NAME,{keyPath:'id'});
    };
  });
}

async function saveVideoToIndexedDB(id,name,blob){
  if(!db)await initDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(STORE_NAME,'readwrite');
    const store=tx.objectStore(STORE_NAME);
    store.put({id,name,blob:blob,timestamp:Date.now()});
    tx.oncomplete=resolve;
    tx.onerror=()=>reject(tx.error);
  });
}

async function loadVideosFromIndexedDB(){
  if(!db)await initDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(STORE_NAME,'readonly');
    const store=tx.objectStore(STORE_NAME);
    const req=store.getAll();
    req.onsuccess=()=>{
      const vids=req.result.map(v=>({
        id:v.id,name:v.name,
        url:URL.createObjectURL(v.blob)
      }));
      resolve(vids);
    };
    req.onerror=()=>reject(req.error);
  });
}

async function deleteVideoFromIndexedDB(id){
  if(!db)await initDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(STORE_NAME,'readwrite');
    const store=tx.objectStore(STORE_NAME);
    store.delete(id);
    tx.oncomplete=resolve;
    tx.onerror=()=>reject(tx.error);
  });
}

let currentVideoIdx=0;
let videoSwipeStartY=0;
let videoSwipeStartX=0;
let shownVideoIndices=[];
let videoClosedByBackButton=false;

function playVideoFullscreen(idx){
  if(!videos.length)return;
  
  // If no index provided, pick random
  if(idx===undefined){
    idx=Math.floor(Math.random()*videos.length);
  }
  
  if(!videos[idx])return;
  currentVideoIdx=idx;
  // Only track as shown if it's not the initial play
  shownVideoIndices=[];
  
  // Push history state so back button closes video
  window.history.pushState({videoOpen:true},'');
  
  showVideoFullscreen(videos[idx].url,idx+1,videos.length);
}

function showVideoFullscreen(url,current,total){
  const fullscreen=document.getElementById('videoFullscreen');
  document.getElementById('videoPlayer').src=url;
  document.getElementById('videoCounter').textContent=`${current}/${total}`;
  currentVideoIdx=current-1;
  fullscreen.style.display='flex';
  document.body.style.overflow='hidden';
  swipeEnabled=false;
}

function nextRandomVideo(){
  if(videos.length===0)return;
  
  // Get available indices (not yet shown)
  const available=[];
  for(let i=0;i<videos.length;i++){
    if(!shownVideoIndices.includes(i)){
      available.push(i);
    }
  }
  
  // If all shown, reset
  if(available.length===0){
    shownVideoIndices=[];
    for(let i=0;i<videos.length;i++){
      available.push(i);
    }
  }
  
  // Pick random from available
  const randomIdx=available[Math.floor(Math.random()*available.length)];
  shownVideoIndices.push(randomIdx);
  showVideoFullscreen(videos[randomIdx].url,randomIdx+1,videos.length);
}

function closeVideoFullscreen(){
  document.getElementById('videoFullscreen').style.display='none';
  document.getElementById('videoPlayer').src='';
  document.body.style.overflow='auto';
  swipeEnabled=true;
  // Restore motivation home view
  const home=document.getElementById('motivationHome');
  if(home)home.style.display='grid';
  document.getElementById('quotesView').style.display='none';
  document.getElementById('optionView').style.display='none';
  
  // Go back in history if not already closed by back button
  if(!videoClosedByBackButton){
    window.history.back();
  }
  
  // Reset flag after short delay
  setTimeout(()=>{videoClosedByBackButton=false;},100);
}

function renderRecord(){
  const keys=Object.keys(allData).sort();
  const now=new Date();
  
  let filteredKeys=keys;
  if(recordPeriod>0){
    const cutoff=new Date(now.getTime()-recordPeriod*24*60*60*1000).toISOString().slice(0,10);
    filteredKeys=keys.filter(k=>k>=cutoff);
  }
  
  if(filteredKeys.length===0){
    document.getElementById('recordList').innerHTML='<div class="empty-record">No records yet.<br>Start logging today!</div>';
    document.getElementById('recordStats').innerHTML='<div class="card" style="text-align:center;margin-bottom:0"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">平均</div><div style="font-family:\'Bebas Neue\',sans-serif;font-size:24px;color:var(--accent)">—</div></div><div class="card" style="text-align:center;margin-bottom:0"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">最高</div><div style="font-family:\'Bebas Neue\',sans-serif;font-size:24px;color:var(--accent)">—</div></div>';
    renderCalendar();
    return;
  }

  const scores=filteredKeys.map(k=>({date:k,score:calcScoreFor(allData[k])}));
  const avgScore=Math.round(scores.reduce((a,b)=>a+b.score,0)/scores.length);
  const maxScore=Math.max(...scores.map(s=>s.score));
  
  document.getElementById('recordAvg').textContent=avgScore;
  document.getElementById('recordMax').textContent=maxScore;
  
  // Draw graph
  drawScoreGraph(scores);
  
  // List
  const el=document.getElementById('recordList');
  el.innerHTML='';
  filteredKeys.forEach(k=>{
    const r=allData[k];
    const sc=calcScoreFor(r);
    const sm=subjects.reduce((a,s)=>a+s.books.reduce((a2,b)=>a2+(r.study?.[s.id]?.[b.id]||0),0),0);
    const ch=Object.values(r.checks||{}).filter(Boolean).length;

      <div><div class="record-date-txt" style="cursor:pointer" onclick="showRecordDetail('${k}'); event.stopPropagation()">${k}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${minsToStr(sm)}</div></div>

      <div class="record-item"><span>Meal</span><span class="record-val">${r.health?.meal||0}/5</span></div>
    </div>`;
    el.appendChild(div);
  });
  
  // Render calendar
  renderCalendar();
}

function drawScoreGraph(scores){
  const svg=document.getElementById('scoreChart');
  svg.innerHTML='';
  
  const w=400,h=300,padding=40;
  const graphW=w-padding*2,graphH=h-padding*2;
  
  // Draw axes
  const axes=document.createElementNS('http://www.w3.org/2000/svg','g');
  axes.innerHTML=`
    <line x1="${padding}" y1="${h-padding}" x2="${w-padding}" y2="${h-padding}" stroke="var(--border)" stroke-width="1"/>
    <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${h-padding}" stroke="var(--border)" stroke-width="1"/>
    <text x="10" y="${padding-10}" font-size="10" fill="var(--muted)">100</text>
    <text x="10" y="${h-padding+15}" font-size="10" fill="var(--muted)">0</text>
  `;
  svg.appendChild(axes);
  
  // Draw line
  const points=scores.map((s,i)=>{
    const x=padding+(i/(scores.length-1||1))*graphW;
    const y=h-padding-(s.score/100)*graphH;
    return `${x},${y}`;
  }).join(' ');
  
  const line=document.createElementNS('http://www.w3.org/2000/svg','polyline');
  line.setAttribute('points',points);
  line.setAttribute('stroke','var(--accent)');
  line.setAttribute('stroke-width','2');
  line.setAttribute('fill','none');
  svg.appendChild(line);
  
  // Draw points
  scores.forEach((s,i)=>{
    const x=padding+(i/(scores.length-1||1))*graphW;
    const y=h-padding-(s.score/100)*graphH;
    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',x);
    circle.setAttribute('cy',y);
    circle.setAttribute('r','3');
    circle.setAttribute('fill','var(--accent)');
    svg.appendChild(circle);
  });
}

function renderCalendar(){
  const grid=document.getElementById('calendarGrid');
  if(!grid)return; // グリッドが見つからない場合は処理しない
  
  const year=calendarMonthDate.getFullYear();
  const month=calendarMonthDate.getMonth();
  
  // Month/Year header
  const monthName=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][month];
  const headerEl=document.getElementById('calMonthYear');
  if(headerEl)headerEl.textContent=`${monthName} ${year}`;
  
  // Get days in month
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  
  grid.innerHTML='';
  
  // Day headers
  ['S','M','T','W','T','F','S'].forEach(d=>{
    const header=document.createElement('div');
    header.style.cssText='color:var(--muted);font-weight:bold;padding:4px';
    header.textContent=d;
    grid.appendChild(header);
  });
  
  // Empty cells
  for(let i=0;i<firstDay;i++){
    const empty=document.createElement('div');
    grid.appendChild(empty);
  }
  
  // Days
  for(let day=1;day<=daysInMonth;day++){
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const hasData=allData[dateStr];
    const dayEl=document.createElement('button');
    dayEl.style.cssText=`
      padding:6px;border-radius:6px;border:1px solid var(--border);
      background:${hasData?'var(--accent)':'var(--surface)'};
      color:${hasData?'var(--black)':'var(--text)'};
      cursor:pointer;font-weight:bold;font-size:12px
    `;
    dayEl.textContent=day;
    dayEl.onclick=()=>startEditMode(dateStr);
    grid.appendChild(dayEl);
  }
}

function calcScoreFor(r){
  const sm=subjects.reduce((a,s)=>a+s.books.reduce((a2,b)=>a2+(r.study?.[s.id]?.[b.id]||0),0),0);
  
  // 70% Study - based on goal percentage
  const studyScore=Math.min(70,(sm/goalMins)*70);
  
  // 15% Exercise (increased from 10)
  const exScore=Math.min(15,(r.health?.exercise||0)/30*15);
  
  // 15% Other (checks + diary, increased from 10)
  const n=Math.max(1,checkItems.length);
  const checkScore=(Object.values(r.checks||{}).filter(Boolean).length/n)*10;
  const diaryScore=(r.diary?.length||0)>0?5:0;
  const otherScore=checkScore+diaryScore;
  
  return Math.min(100,Math.round(studyScore+exScore+otherScore));
}

        <div style="font-size:12px;color:var(--accent);font-weight:bold;margin-bottom:8px">EXERCISE</div>
        <div style="background:var(--surface);border-radius:12px;padding:12px;font-size:11px">
          ${r.health?.exercise?`<div style="color:var(--text)">${r.health.exercise}m</div>`:'<div style="color:var(--muted)">No record</div>'}
        </div>
      </div>
      
      <div style="margin-bottom:12px">
        <div style="font-size:12px;color:var(--accent);font-weight:bold;margin-bottom:8px">CHECKS (${ch}/${checkItems.length})</div>
        <div style="background:var(--surface);border-radius:12px;padding:12px;font-size:11px">
          ${checksDetail||'<div style="color:var(--muted)">No record</div>'}
        </div>
      </div>
      
      ${r.diary?`<div style="margin-bottom:12px">
        <div style="font-size:12px;color:var(--accent);font-weight:bold;margin-bottom:8px">DIARY</div>
        <div style="background:var(--surface);border-radius:12px;padding:12px;font-size:11px;color:var(--text2);line-height:1.6">${r.diary}</div>
      </div>`:''}
      
      ${(()=>{
        // Strength
        const sd=r.strengthDaily||[];
        if(!sd.length)return '';
        let html='<div style="margin-bottom:12px"><div style="font-size:12px;color:var(--accent);font-weight:bold;margin-bottom:8px">Strength</div><div style="background:var(--surface);border-radius:12px;padding:12px">';
        sd.forEach(id=>{
          const ex=strengthList.find(e=>e.id===id);
          const d=r.strength?.[id]||{};
          if(!ex)return;
          const vol=(d.reps||0)*(d.weight||0);
          html+=`<div style="margin-bottom:6px;font-size:11px"><span style="color:var(--accent3)">${ex.name}</span><span style="color:var(--text2);margin-left:8px">${d.reps||0}reps × ${d.weight||0}kg${vol?` = ${vol}kg`:''}</span>${d.time?`<span style="color:var(--muted);margin-left:6px">${d.time}m</span>`:''}</div>`;
        });
        html+='</div></div>';
        return html;
      })()}
      
      ${(()=>{
        // Cardio
        const cd=r.cardio||{};
        const entries=Object.entries(cd).filter(([id,d])=>d.distance||d.time);
        if(!entries.length)return '';
        let html='<div style="margin-bottom:12px"><div style="font-size:12px;color:var(--accent);font-weight:bold;margin-bottom:8px">Cardio</div><div style="background:var(--surface);border-radius:12px;padding:12px">';
        entries.forEach(([id,d])=>{
          const ex=cardioList.find(e=>e.id===id);
          const name=ex?ex.name:id;
          const kcal=calcCardioCalories(d.distance,d.time);
          html+=`<div style="margin-bottom:6px;font-size:11px"><span style="color:var(--green)">${name}</span><span style="color:var(--text2);margin-left:8px">${d.distance||0}km ${d.time||0}m${kcal?` ${kcal}kcal`:''}</span></div>`;
        });
        html+='</div></div>';
        return html;
      })()}
      
      <button onclick="startEditMode('${date}')" style="width:100%;padding:12px;background:var(--accent);border:none;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.1em;color:var(--black);cursor:pointer;margin-top:4px">✏ このdをEdit</button>
      
    </div>
  `;
  document.body.appendChild(modal);
  modal.classList.add('open');
}

function startEditMode(date){
  // Create record if doesn't exist
  if(!allData[date]){
    allData[date]={study:{},checks:{},health:{sleep:7,exercise:0},cardio:{},strength:{},strengthDaily:[],diary:'',diaryDate:date,healthMemo:''};
  }
  
  // Close detail modal
  document.getElementById('recordDetailModal')?.remove();
  
  // Backup today's state
  editStateBackup=JSON.parse(JSON.stringify(state));
  editDate=date;
  editMode=true;
  
  // Load past date's state into current state
  state=JSON.parse(JSON.stringify(allData[date]||{study:{},checks:{},health:{sleep:7,exercise:0},cardio:{},strength:{},strengthDaily:[],diary:'',diaryDate:date,healthMemo:''}));
  
  // Show banner
  const banner=document.getElementById('editBanner');
  banner.style.display='flex';
  document.getElementById('editBannerDate').textContent=`EDITING: ${date}`;
  
  // Render all with past data
  renderStudy();
  renderChecks();
  renderExercise();
  updateRing();
  calcScore();
  
  // Switch to study tab
  const studyBtn=Array.from(document.querySelectorAll('.tab-btn')).find(b=>b.textContent==='STUDY');
  if(studyBtn)studyBtn.click();
}

function saveEdit(){
  if(!editMode||!editDate)return;
  
  // Save edited state to allData
  allData[editDate]=JSON.parse(JSON.stringify(state));
  localStorage.setItem('ym4_all',JSON.stringify(allData));
  localStorage.setItem('ym4_'+editDate,JSON.stringify(state));
  
  cancelEdit();
}

function cancelEdit(){
  if(!editMode)return;
  
  // Restore today's state
  state=editStateBackup;
  editMode=false;
  editDate=null;
  editStateBackup=null;
  
  // Hide banner
  document.getElementById('editBanner').style.display='none';
  
  // Re-render with today's data
  renderStudy();
  renderChecks();
  renderExercise();
  updateRing();
  calcScore();
  
  // Go back to record tab
  const recordBtn=Array.from(document.querySelectorAll('.tab-btn')).find(b=>b.textContent==='RECORD');
  if(recordBtn)recordBtn.click();
}

function toggleFullscreen(){
  const elem=document.documentElement;
  if(!document.fullscreenElement){
    if(elem.requestFullscreen){
      elem.requestFullscreen().catch(err=>console.log('フルスクリーンエラー:',err));
    }else if(elem.webkitRequestFullscreen){
      elem.webkitRequestFullscreen();
    }else if(elem.mozRequestFullScreen){
      elem.mozRequestFullScreen();
    }else if(elem.msRequestFullscreen){
      elem.msRequestFullscreen();
    }
  }else{
    if(document.exitFullscreen){
      document.exitFullscreen();
    }else if(document.webkitExitFullscreen){
      document.webkitExitFullscreen();
    }else if(document.mozCancelFullScreen){
      document.mozCancelFullScreen();
    }else if(document.msExitFullscreen){
      document.msExitFullscreen();
    }
  }
}

function saveBodyWeight(){
  const bw=document.getElementById('bodyWeightInput').value;
  if(bw&&+bw>0){
    localStorage.setItem('ym4_bodyweight',bw);
    alert('WeightをSaved（'+bw+'kg）');
  }
}

function setBlackBackground(){
  localStorage.setItem('ym4_wallpaper','black');
  document.documentElement.style.setProperty('--wallpaper-url','none');
  document.getElementById('settingsModal')?.remove();
  alert('Black background set');
}

function changeWallpaper(){
  const file=document.getElementById('wallpaperInput').files[0];
  if(!file)return;
  
  const reader=new FileReader();
  reader.onload=e=>{
    const imageData=e.target.result;
    localStorage.setItem('ym4_wallpaper',imageData);
    applyWallpaper(imageData);
    document.getElementById('settingsModal')?.remove();
    alert('Wallpaperを変更しました');
  };
  reader.readAsDataURL(file);
}

function applyWallpaper(imageData){
  // Handle both "data:image/..." and "url('data:image/...')" formats
  const isUrl=imageData.startsWith('url(');
  const url=isUrl?imageData:`url('${imageData}')`;
  document.documentElement.style.setProperty('--wallpaper-url',url);
}

function showExerciseGraph(type){
  const modal=document.createElement('div');
  modal.className='modal-bg';
  modal.id='exerciseGraphModal';
  
  // Build exercise list for selection
  const exercises=type==='strength'?strengthList:cardioList;
  if(!exercises.length){
    alert('Exerciseがありません');
    return;
  }
  
  const exOptions=exercises.map((ex,i)=>`<option value="${ex.id}">${ex.name}</option>`).join('');
  const metricOptions=type==='strength'
    ?`<option value="volume">Total Volume (reps×kg)</option><option value="reps">総reps数</option><option value="kcal">Calories Burned</option>`
    :`<option value="distance">Distance (km)</option><option value="time">Time (m)</option><option value="kcal">Calories Burned</option>`;
  
  modal.innerHTML=`
    <div class="modal" style="max-height:90vh;overflow-y:auto">
      <button style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;margin-bottom:8px" onclick="document.getElementById('exerciseGraphModal').remove()">←</button>
      <div class="modal-title">${type==='strength'?'Strength':'Cardio'} グラフ</div>
      
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <select id="graphExercise" style="padding:8px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px" onchange="renderExerciseGraph('${type}')">
          ${exOptions}
        </select>
        <select id="graphMetric" style="padding:8px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px" onchange="renderExerciseGraph('${type}')">
          ${metricOptions}
        </select>
      </div>
      
      <div style="display:flex;gap:6px;margin-bottom:12px">
        <button class="record-filter-btn active" id="egp7" onclick="setExGraphPeriod(7,this)">7d</button>
        <button class="record-filter-btn" id="egp30" onclick="setExGraphPeriod(30,this)">30d</button>
        <button class="record-filter-btn" id="egp90" onclick="setExGraphPeriod(90,this)">90d</button>
        <button class="record-filter-btn" id="egpall" onclick="setExGraphPeriod(0,this)">全Period</button>
      </div>
      
      <div id="exerciseGraphArea" style="background:var(--surface);border-radius:12px;padding:16px;margin-bottom:12px">

}

function setExGraphPeriod(days,btn){
  window._exGraphPeriod=days;
  document.querySelectorAll('#exerciseGraphModal .record-filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const type=document.getElementById('exerciseGraphModal').dataset.type||
    (document.getElementById('graphMetric').innerHTML.includes('負荷量')?'strength':'cardio');
  renderExerciseGraph(type);
}

function getExGraphValue(r,exId,metric,type){
  if(type==='strength'){
    const d=r.strength?.[exId];
    if(!d)return null;
    if(metric==='volume')return (d.reps||0)*(d.weight||0);
    if(metric==='reps')return d.reps||0;
    if(metric==='kcal')return calcStrengthCalories(d.time||0,d.intensity||'moderate');
  }else{
    const d=r.cardio?.[exId];
    if(!d)return null;
    if(metric==='distance')return d.distance||0;
    if(metric==='time')return d.time||0;
    if(metric==='kcal')return calcCardioCalories(d.distance,d.time);
  }
  return null;
}

function renderExerciseGraph(type){
  const exId=document.getElementById('graphExercise').value;
  const metric=document.getElementById('graphMetric').value;
  const period=window._exGraphPeriod||7;
  
  const exercises=type==='strength'?strengthList:cardioList;
  const ex=exercises.find(e=>e.id===exId);
  
  // Collect data
  const keys=Object.keys(allData).sort();
  const now=new Date();
  let filtered=keys;
  if(period>0){
    const cutoff=new Date(now.getTime()-period*24*60*60*1000).toISOString().slice(0,10);
    filtered=keys.filter(k=>k>=cutoff);
  }
  
  // Get data points (only days with data for this exercise)
  const points=filtered.map(date=>{
    const val=getExGraphValue(allData[date],exId,metric,type);
    return {date,val};
  }).filter(p=>p.val!==null&&p.val>0);
  
  // Draw SVG
  const svg=document.getElementById('exGraphSvg');
  svg.innerHTML='';
  const W=360,H=200,pad={t:20,r:20,b:30,l:45};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  
  const metricLabel={volume:'Total Volume(kg)',reps:'reps数',kcal:'kcal',distance:'km',time:'m'};
  
  if(points.length<2){
    svg.innerHTML=`<text x="${W/2}" y="${H/2}" text-anchor="middle" fill="var(--muted)" font-size="13">データが少なすぎます</text>`;
  }else{
    const vals=points.map(p=>p.val);
    const minV=Math.min(...vals);
    const maxV=Math.max(...vals);
    const range=maxV-minV||1;
    
    const xStep=iW/(points.length-1);
    const toX=(i)=>pad.l+i*xStep;
    const toY=(v)=>pad.t+iH-(((v-minV)/range)*iH);
    
    // Grid lines
    for(let i=0;i<=4;i++){
      const y=pad.t+(iH/4)*i;
      const v=Math.round(maxV-((range/4)*i));
      svg.innerHTML+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="var(--border)" stroke-width="0.5"/>`;
      svg.innerHTML+=`<text x="${pad.l-4}" y="${y+4}" text-anchor="end" fill="var(--muted)" font-size="9">${v}</text>`;
    }
    
    // Line path
    const pathD=points.map((p,i)=>`${i===0?'M':'L'}${toX(i)},${toY(p.val)}`).join(' ');
    svg.innerHTML+=`<path d="${pathD}" stroke="var(--accent3)" stroke-width="2" fill="none"/>`;
    
    // Dots (clickable)
    points.forEach((p,i)=>{
      const cx=toX(i),cy=toY(p.val);
      svg.innerHTML+=`<circle cx="${cx}" cy="${cy}" r="5" fill="var(--accent3)" style="cursor:pointer" onclick="showRecordDetail('${p.date}')"/>`;
      // X label (dates - show every n)
      const step=Math.ceil(points.length/6);
      if(i%step===0||i===points.length-1){
        const label=p.date.slice(5);
        svg.innerHTML+=`<text x="${cx}" y="${H-pad.b+14}" text-anchor="middle" fill="var(--muted)" font-size="8">${label}</text>`;
      }
    });
    
    // Metric label
    svg.innerHTML+=`<text x="8" y="${pad.t}" fill="var(--muted)" font-size="9" transform="rotate(-90,8,${pad.t}) translate(-${iH/2},0)">${metricLabel[metric]||''}</text>`;
  }
  
  // List below graph
  const listEl=document.getElementById('exerciseGraphList');
  listEl.innerHTML='';
  if(points.length===0){
    listEl.innerHTML='<div style="color:var(--muted);text-align:center;padding:16px;font-size:12px">No record</div>';
    return;
  }
  
  // Sort newest first
  [...points].reverse().forEach(p=>{
    const r=allData[p.date];
    const div=document.createElement('div');
    div.className='card';
    div.style.cssText='margin-bottom:6px;cursor:pointer';
    div.onclick=()=>showRecordDetail(p.date);
    
    // Build detail string
    let detail='';
    if(type==='strength'){
      const d=r.strength?.[exId]||{};
      detail=`${d.reps||0}reps × ${d.weight||0}kg`;
      if(d.time)detail+=` ${d.time}m`;
    }else{
      const d=r.cardio?.[exId]||{};
      detail=`${d.distance||0}km ${d.time||0}m`;
    }
    
    div.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:12px;color:var(--accent3)">${p.date}</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--accent2)">${p.val}${metric==='distance'?'km':metric==='time'?'m':metric==='kcal'?'kcal':''}</div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">${detail}</div>
    `;
    listEl.appendChild(div);
  });
}

  let currentStart=new Date(startDate);
  let currentEnd=new Date(today);
  let currentTab='7d';

    const dates=[];

    while(current<=end){

      </div>
      
      <div style="padding:20px;text-align:center;border-top:1px solid var(--surface3)">
        <button class="modal-cancel" onclick="document.getElementById('graphModalFull').remove()" style="width:100%">Close</button>
      </div>
    </div>
  `;
  
  document.body.appendChild(modal);
  modal.classList.add('open');
  
  window.updateGraphPeriod=(days,period,btn)=>{
    const end=new Date();
    const start=new Date();
    if(period==='all'){
      start.setFullYear(start.getFullYear()-2);
    }else if(typeof days==='number'){
      start.setDate(start.getDate()-days+1);
    }
    
    const {svg,stats}=renderGraph(start,end,period);
    document.getElementById('graphContainer').innerHTML=svg;
    document.getElementById('statsContainer').innerHTML=stats;
    
    document.querySelectorAll('.period-btn').forEach(b=>{
      b.style.fontWeight='normal';
      b.style.borderColor='var(--surface3)';
    });
    btn.style.fontWeight='bold';
    btn.style.borderColor='var(--accent)';
  };
  
  window.selectDateRange=(elem)=>{
    const dateStr=elem.getAttribute('data-date');
    const selected=document.querySelector('#datePickerContainer [style*="border: 1px solid var(--accent)"]');
    if(selected){
      selected.style.borderColor='transparent';
    }
    elem.style.borderColor='var(--accent)';
    
    document.getElementById('selectedStart').textContent=dateStr;
    document.getElementById('selectedEnd').textContent=dateStr;
    
    const {svg,stats}=renderGraph(new Date(dateStr),new Date(dateStr),'custom');
    document.getElementById('graphContainer').innerHTML=svg;
    document.getElementById('statsContainer').innerHTML=stats;
  };
}

function showStudyGraphRange(){
  const startElem=document.getElementById('graphStartDate');
  const endElem=document.getElementById('graphEndDate');
  
  if(!startElem.value||!endElem.value){
    alert('日付を選択してください');
    return;
  }
  
  const startD=new Date(startElem.value);
  const endD=new Date(endElem.value);
  
  if(startD>endD){
    alert('開始日は終了日より前にしてください');
    return;
  }
  
  const dates=[];
  const times=[];
  let current=new Date(startD);
  
  while(current<=endD){
    const key='ym4_'+current.getFullYear().toString().padStart(4,'0')+'-'+(current.getMonth()+1).toString().padStart(2,'0')+'-'+current.getDate().toString().padStart(2,'0');
    const dayData=JSON.parse(localStorage.getItem(key)||'{}');
    const sm=subjects.reduce((a,s)=>a+s.books.reduce((a2,b)=>a2+(dayData.study?.[s.id]?.[b.id]||0),0),0);
    dates.push((current.getMonth()+1)+'/'+(current.getDate()).toString().padStart(2,'0'));
    times.push(Math.round(sm/60));
    current.setDate(current.getDate()+1);
  }
  
  const modal=document.createElement('div');
  modal.className='modal-bg';
  modal.id='graphRangeModal';
  
  const maxTime=Math.max(...times,1)||1;
  const chartHeight=200;
  const chartWidth=300;
  const numDays=Math.max(times.length,1);
  const barWidth=chartWidth/numDays;
  
  let bars='';
  times.forEach((t,i)=>{
    const h=(t/maxTime)*chartHeight;
    const x=i*barWidth+barWidth/2;
    const y=chartHeight-h;
    bars+=`<rect x="${x-barWidth/3}" y="${y}" width="${barWidth*0.6}" height="${h}" fill="var(--accent)" opacity="0.8"/>`;
  });
  
  const avg=times.length>0?(times.reduce((a,b)=>a+b,0)/times.length).toFixed(1):0;
  const total=times.reduce((a,b)=>a+b,0);
  
  modal.innerHTML=`
    <div class="modal" style="max-width:340px;max-height:80vh;overflow-y:auto">
      <div class="modal-title">勉強時間 ${startElem.value} 〜 ${endElem.value}</div>
      <div style="margin:20px 0;background:var(--surface3);border-radius:4px;padding:20px">
        <svg viewBox="0 0 320 240" style="width:100%;height:auto">
          <line x1="30" y1="20" x2="30" y2="220" stroke="var(--muted)" stroke-width="1"/>
          <line x1="30" y1="220" x2="310" y2="220" stroke="var(--muted)" stroke-width="1"/>
          <text x="25" y="225" font-size="11" fill="var(--muted)" text-anchor="end">0h</text>
          <text x="25" y="25" font-size="11" fill="var(--muted)" text-anchor="end">${maxTime.toFixed(1)}h</text>
          <g>${bars}</g>
          ${dates.map((d,i)=>{
            const x=i*barWidth+barWidth/2;
            return dates.length<=14?`<text x="${x}" y="235" font-size="10" fill="var(--muted)" text-anchor="middle">${d}</text>`:'';
          }).join('')}
        </svg>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px">
        <div>平均: ${avg}時間</div>
        <div>最高: ${Math.max(...times,0)}時間</div>
        <div>合計: ${total}時間</div>
        <div>日数: ${times.length}日</div>
      </div>
      <button class="modal-cancel" onclick="document.getElementById('graphRangeModal').remove()" style="width:100%">Close</button>
    </div>
  `;
  document.body.appendChild(modal);
  modal.classList.add('open');
}

// Swipe gesture for tabs
let touchStartX=0,touchEndX=0,touchStartY=0,touchEndY=0;
let swipeEnabled=true;

function handleSwipe(){
  if(!swipeEnabled)return;
  const dx=touchEndX-touchStartX;
  const dy=touchEndY-touchStartY;
  if(Math.abs(dx)<Math.abs(dy)||Math.abs(dx)<50)return;
  
  const btns=Array.from(document.querySelectorAll('.tab-btn'));
  const idx=btns.findIndex(b=>b.classList.contains('active'));
  if(dx<0&&idx<btns.length-1){
    btns[idx+1].click();
    btns[idx+1].scrollIntoView({inline:'center',behavior:'smooth'});
  }else if(dx>0&&idx>0){
    btns[idx-1].click();
    btns[idx-1].scrollIntoView({inline:'center',behavior:'smooth'});
  }
}
document.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX;touchStartY=e.changedTouches[0].screenY;},{passive:true});
document.addEventListener('touchend',e=>{touchEndX=e.changedTouches[0].screenX;touchEndY=e.changedTouches[0].screenY;handleSwipe();},{passive:true});

let modalMode='',modalSi=-1;
function openModal(mode,si){modalMode=mode;modalSi=si??-1;const titles={subject:'Add Subject',book:'Add Textbook',check:'Add Checklist Item',cardio:'Add Cardio Exercise',strength:'Add Strength Exercise',goal:'Set Study Goal',quote:'Add Quote'};document.getElementById('modalTitle').textContent=titles[mode]||'Add';let body='';if(mode==='goal'){const gh=Math.floor(goalMins/60),gm=goalMins%60;body=`<div style="font-size:12px;color:var(--muted);margin-bottom:12px">現在のGoal: ${minsToStr(goalMins)}</div><div style="display:flex;gap:8px;margin-bottom:8px"><div style="flex:1"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">Time (h)</div><input class="modal-input" type="number" id="goalH" min="0" max="24" value="${gh}" style="margin-bottom:0"></div><div style="flex:1"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">m (min)</div><input class="modal-input" type="number" id="goalM" min="0" max="59" value="${gm}" style="margin-bottom:0"></div></div>`;}else if(mode==='quote'){body=`<textarea class="diary-area" id="modalInput" placeholder="Quoteを入力..." style="min-height:100px"></textarea>`;}else if(mode==='cardio'||mode==='strength'){const uOpts=mode==='cardio'?['km','m','reps','kcal']:['reps','kg','set'];body=`<input class="modal-input" id="modalInput" placeholder="${mode==='cardio'?'例: ランニング':'例: ベンチプレス'}"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">Unit</div><select class="modal-input" id="modalUnit" style="cursor:pointer;color:var(--text)">${uOpts.map(u=>`<option value="${u}">${u}</option>`).join('')}</select>`;}else{const ph={subject:'例: 物理',book:'例: 化学の新演習',check:'例: 読書 30m'};body=`<input class="modal-input" id="modalInput" placeholder="${ph[mode]||''}">`;}document.getElementById('modalBody').innerHTML=body;document.getElementById('modalOk').textContent=mode==='goal'?'Set':'Add';document.getElementById('modal').classList.add('open');setTimeout(()=>document.getElementById('modalInput')?.focus(),300);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function modalConfirm(){if(modalMode==='goal'){const h=parseInt(document.getElementById('goalH').value)||0;const m=parseInt(document.getElementById('goalM').value)||0;const tot=h*60+m;if(tot>0){goalMins=tot;localStorage.setItem('ym4_goal',tot);updateRing();}closeModal();return;}if(modalMode==='quote'){const text=document.getElementById('modalInput')?.value.trim();if(!text){closeModal();return;}quotes.push({id:'q'+Date.now(),text});saveQuotes();renderQuotesList();closeModal();return;}const val=document.getElementById('modalInput')?.value.trim();if(!val){closeModal();return;}if(modalMode==='subject'){subjects.push({id:'s'+Date.now(),name:val,books:[]});saveSubjects();renderStudy();}else if(modalMode==='book'){subjects[modalSi].books.push({id:'b'+Date.now(),name:val});saveSubjects();renderStudy();}else if(modalMode==='check'){checkItems.push({id:'c'+Date.now(),label:val});saveChecks();renderChecks();calcScore();}else if(modalMode==='cardio'){const u=document.getElementById('modalUnit')?.value||'km';cardioList.push({id:'ca'+Date.now(),name:val,unit:u});saveCardio();renderCardio();}else if(modalMode==='strength'){const u=document.getElementById('modalUnit')?.value||'reps';const id='st'+Date.now();strengthList.push({id,name:val,unit:u});state.strength[id]=[0,0,0];saveStrength();saveState();renderStrength();}closeModal();}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
